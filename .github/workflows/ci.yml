name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # Cancel superseded PR runs; a push to main always runs to completion.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Format + Lint + Unit + E2E
    runs-on: ubuntu-latest
    # Bound worst-case cost: a hung E2E/webServer can otherwise burn the default
    # 6-hour job cap. The whole suite finishes well under this.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Install server dependencies
        run: cd server && (npm ci || npm install)
      - name: Prettier format check
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:unit

      # --- E2E: iPhone 14 + Desktop Chrome, on BOTH pull_request AND push:main ---
      # These two profiles carry every device-gated spec (mobile-only checks run on
      # iPhone 14; layout/measurement specs are Desktop-Chrome-only), so together
      # they execute every merge-gating test.
      #
      # push:main runs E2E too — deliberately. It used to be skipped to save minutes,
      # on the assumption "the squashed PR already ran E2E green under review." That
      # assumption fails the moment a PR is merged PAST a red E2E check: main then has
      # no E2E net and a real break ships silently — which happened (#167 shipped a
      # broken home page; main's push CI was green only because E2E didn't run there).
      # One E2E run per merge is cheap insurance against that.
      # Cache the Chromium binary so runs don't re-download it each time (keyed on the
      # resolved Playwright version). On a cache hit `install` skips the download;
      # `install-deps` still installs the system libs (fast).
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium
      - name: E2E tests (iPhone 14 + Desktop Chrome)
        run: npx playwright test --project="iPhone 14" --project="Desktop Chrome"
