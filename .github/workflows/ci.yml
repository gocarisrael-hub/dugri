name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # Cancel superseded PR runs; a push to main always runs to completion.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Format + Lint + Unit + E2E
    runs-on: ubuntu-latest
    # Bound worst-case cost: a hung E2E/webServer can otherwise burn the default
    # 6-hour job cap. The whole suite finishes well under this.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Install server dependencies
        run: cd server && (npm ci || npm install)
      - name: Prettier format check
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:unit

      # --- E2E scope by event, to keep GitHub Actions minutes down ---
      # The Playwright suite across device profiles is the expensive part.
      #   PR / manual  -> iPhone 14 + Desktop Chrome. These are the only two
      #                   profiles with device-gated specs (mobile-only checks run
      #                   on iPhone 14; several layout/measurement specs are
      #                   Desktop-Chrome-only), so together they execute every
      #                   merge-gating test.
      #   push:main    -> NO E2E. The merged commit is a squash of a PR that
      #                   already ran iPhone + Desktop E2E under review; running it
      #                   again on main just doubles every feature's minutes.
      #                   Prettier/ESLint/Vitest above still run on main as a fast
      #                   post-merge sanity check.
      # Cache the Chromium binary so non-push runs don't re-download it each time
      # (keyed on the resolved Playwright version). On a cache hit, `install`
      # skips the download; `install-deps` still installs the system libs (fast).
      - name: Cache Playwright browsers
        if: github.event_name != 'push'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: github.event_name != 'push'
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium
      - name: E2E tests (iPhone 14 + Desktop Chrome)
        if: github.event_name != 'push'
        run: npx playwright test --project="iPhone 14" --project="Desktop Chrome"
