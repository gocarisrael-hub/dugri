name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly full 3-device E2E matrix (03:17 UTC) — backstops the single-device
    # PR gate so a Desktop/Pixel-only regression is caught within a day.
    - cron: '17 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Format + Lint + Unit + E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Install server dependencies
        run: cd server && (npm ci || npm install)
      - name: Prettier format check
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Unit tests (Vitest)
        run: npm run test:unit

      # --- E2E scope by event, to keep GitHub Actions minutes down ---
      # The full Playwright suite across 3 device profiles is the expensive part.
      #   PR              -> iPhone 14 only (fast gate; most visitors are on mobile)
      #   nightly/manual  -> full 3-device matrix (Desktop Chrome + iPhone 14 + Pixel 7)
      #   push:main       -> NO E2E. The merged commit is a squash of a PR that
      #                      already ran E2E under review; re-running the full suite
      #                      on main just doubled every feature's minutes. The
      #                      Prettier/ESLint/Vitest steps above still run on main as
      #                      a fast post-merge sanity check.
      - name: Install Playwright browsers
        if: github.event_name != 'push'
        run: npx playwright install --with-deps chromium
      - name: E2E tests (PR — iPhone 14 only)
        if: github.event_name == 'pull_request'
        run: npx playwright test --project="iPhone 14"
      - name: E2E tests (full 3-device matrix — nightly / manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: npx playwright test
