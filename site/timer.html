    <title>טיימר 60 שניות - דוגרי</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />

    <style>
      :root {
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: var(--font);
        color: var(--ink);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 20px;
        text-align: center;
        overflow-x: hidden;
        background:
          radial-gradient(60% 40% at 80% -5%, rgba(229, 25, 125, 0.12), transparent 60%),
          radial-gradient(50% 40% at 12% 6%, rgba(188, 154, 76, 0.12), transparent 60%),
          radial-gradient(70% 50% at 50% 110%, rgba(155, 45, 84, 0.08), transparent 65%), var(--bg);
      }

      .logo {
        width: 116px;
        height: auto;
        margin-bottom: 10px;
        opacity: 0;
        transform: translateY(8px);
        animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s forwards;
      }

      h1 {
        font-family: var(--display);
        font-weight: 900;
        font-size: 24px;
        color: var(--sage-deep);
        letter-spacing: -0.01em;
        opacity: 0;
        transform: translateY(8px);
        animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.12s forwards;
      }

      h1 .dot {
        color: var(--sage);
      }

      @keyframes rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ---- Countdown number (primary display) ---- */
      .count-wrap {
        position: relative;
        z-index: 2;
        margin: 26px 0 2px;
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: translateY(10px) scale(0.98);
        animation: rise 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards;
      }

      /* soft ambient glow behind the number */
      .count-wrap::before {
        content: '';
        position: absolute;
        inset: -8% -14%;
        z-index: -1;
        border-radius: 50%;
        background: radial-gradient(
          closest-side,
          rgba(229, 25, 125, 0.18),
          rgba(188, 154, 76, 0.1) 55%,
          transparent 72%
        );
        filter: blur(6px);
        opacity: 0.85;
        transition: opacity 0.6s ease;
        animation: breathe 5.5s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.06);
          opacity: 1;
        }
      }

      .count {
        font-family: var(--display);
        font-weight: 900;
        font-size: 168px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.03em;
        background: linear-gradient(140deg, var(--sage) 0%, var(--sage-deep) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        transition: transform 0.18s cubic-bezier(0.3, 1.6, 0.4, 1);
        will-change: transform;
      }

      .count.bump {
        animation: bump 0.4s cubic-bezier(0.3, 1.4, 0.5, 1);
      }

      @keyframes bump {
        0% {
          transform: scale(1);
        }
        30% {
          transform: scale(1.14);
        }
        100% {
          transform: scale(1);
        }
      }

      .count.done {
        -webkit-text-fill-color: initial;
        background: none;
        color: var(--sage-deep);
        font-size: 52px;
        animation: pop 0.6s cubic-bezier(0.2, 1.5, 0.3, 1);
      }

      @keyframes pop {
        0% {
          transform: scale(0.6);
          opacity: 0;
        }
        60% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .status {
        color: var(--muted);
        font-weight: 700;
        font-size: 15px;
        margin-top: 4px;
        min-height: 22px;
        letter-spacing: 0.01em;
        transition: color 0.3s ease;
      }

      .status.done {
        color: var(--sage);
      }

      /* ---- Controls ---- */
      .controls {
        display: flex;
        gap: 12px;
        margin-top: 26px;
        flex-wrap: wrap;
        justify-content: center;
        opacity: 0;
        transform: translateY(8px);
        animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.32s forwards;
      }

      .btn {
        position: relative;
        overflow: hidden;
        font-family: var(--display);
        font-weight: 800;
        font-size: 18px;
        border: none;
        cursor: pointer;
        padding: 15px 34px;
        border-radius: 999px;
        text-decoration: none;
        color: #fff;
        background: linear-gradient(135deg, var(--sage), var(--sage-deep));
        box-shadow:
          0 10px 24px rgba(229, 25, 125, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        touch-action: manipulation;
        transition:
          color 0.14s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.18s cubic-bezier(0.3, 1.3, 0.5, 1),
          box-shadow 0.25s ease,
          filter 0.25s ease;
        -webkit-tap-highlight-color: transparent;
      }
      /* press: directional white wipe (RTL sweeps in from the right, 300ms) */
      .btn:not(.sec) {
        isolation: isolate;
        border: 1.5px solid #141414;
      }
      .btn:not(.sec)::before {
        content: '';
        position: absolute;
        inset: 0;
        z-index: -1;
        background: #fff;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.14s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn:not(.sec):active {
        color: #141414;
      }
      .btn:not(.sec):active::before {
        transform: scaleX(1);
      }

      @media (hover: hover) {
        .btn:hover {
          transform: translateY(-2px);
          filter: brightness(1.05);
          box-shadow:
            0 14px 30px rgba(229, 25, 125, 0.36),
            inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
      }

      .btn:active {
        transform: translateY(0) scale(0.97);
      }

      .btn:focus-visible {
        outline: 3px solid rgba(229, 25, 125, 0.4);
        outline-offset: 3px;
      }

      /* sheen sweep on hover */
      .btn::after {
        content: '';
        position: absolute;
        top: 0;
        left: -60%;
        width: 45%;
        height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.45), transparent);
        transform: skewX(-18deg);
        transition: left 0.6s ease;
      }

      @media (hover: hover) {
        .btn:hover::after {
          left: 130%;
        }
      }

      .btn.sec {
        background: none;
        color: var(--sage-deep);
        box-shadow: none;
        border: 2px solid var(--line);
      }

      .btn.sec::after {
        display: none;
      }

      @media (hover: hover) {
        .btn.sec:hover {
          background: var(--section);
          filter: none;
          box-shadow: 0 8px 18px rgba(155, 45, 84, 0.12);
        }
      }

      .back {
        margin-top: 28px;
        font-size: 14px;
        color: var(--muted);
        opacity: 0;
        animation: rise 0.7s ease 0.42s forwards;
      }

      .back a {
        color: var(--sage-deep);
        font-weight: 700;
        text-decoration: none;
        border-bottom: 1px solid transparent;
        transition: border-color 0.2s ease;
      }

      .back a:hover {
        border-color: var(--sage-deep);
      }

      /* ---- Reduced motion ---- */
      @media (prefers-reduced-motion: reduce) {
        .logo,
        h1,
        .count-wrap,
        .controls,
        .back {
          animation: none;
          opacity: 1;
          transform: none;
        }
        .count-wrap::before {
          animation: none;
        }
        .count,
        .count.bump,
        .count.done {
          animation: none;
          transition: none;
        }
        .btn::after {
          display: none;
        }
        .btn:not(.sec),
        .btn:not(.sec)::before {
          transition: none;
        }
      }

      @media (max-width: 380px) {
        .count {
          font-size: 118px;
        }
      }

      /* utility */
      .hidden {
        display: none;
      }
    </style>
    <script src="js/editor.js" defer></script>
  </head>
  <body>
    <img class="logo" src="assets/logo.png" alt="דוגרי" />
    <h1>טיימר<span class="dot"> · </span>60 שניות</h1>

    <div class="count-wrap">
      <div class="count" id="count" data-testid="timer-count">60</div>
    </div>
    <div class="status" id="status">לחצו התחל</div>

    <div class="controls">
      <button class="btn" id="toggle" type="button" data-testid="timer-toggle">התחל</button>
      <button class="btn sec hidden" id="reset" type="button" data-testid="timer-reset">
        איפוס
      </button>
    </div>

    <p class="back"><a href="index.html" data-edit="timer-back-link">חזרה לדוגרי ←</a></p>

    <script type="module">
      import { tick } from './js/timer.js';

      (function () {
        'use strict';

        var DURATION = 60000;
        var reduceMotion =
          window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        var els = {
          count: document.getElementById('count'),
          status: document.getElementById('status'),
          toggle: document.getElementById('toggle'),
          reset: document.getElementById('reset'),
        };

        var elapsed = 0;
        var lastStart = 0;
        var running = false;
        var raf = 0;
        var audio = null;
        var lastShown = -1;

        function setCount(state) {
          if (state.remaining !== lastShown) {
            lastShown = state.remaining;
            els.count.textContent = String(state.remaining);
            if (!reduceMotion && !state.done) {
              els.count.classList.remove('bump');
              // force reflow so the animation can restart each second
              void els.count.offsetWidth;
              els.count.classList.add('bump');
            }
          }
        }

        function beep() {
          try {
            audio = audio || new (window.AudioContext || window.webkitAudioContext)();
            [0, 0.22, 0.44].forEach(function (t) {
              var o = audio.createOscillator();
              var g = audio.createGain();
              o.type = 'sine';
              o.frequency.value = 880;
              o.connect(g);
              g.connect(audio.destination);
              var s = audio.currentTime + t;
              g.gain.setValueAtTime(0.001, s);
              g.gain.exponentialRampToValueAtTime(0.32, s + 0.02);
              g.gain.exponentialRampToValueAtTime(0.001, s + 0.18);
              o.start(s);
              o.stop(s + 0.2);
            });
          } catch (e) {
            /* audio not available */
          }
        }

        function finish() {
          running = false;
          elapsed = DURATION;
          cancelAnimationFrame(raf);
          tick(DURATION, DURATION);
          lastShown = -1;
          els.count.classList.add('done');
          els.count.textContent = 'הזמן נגמר!';
          els.status.textContent = 'כל הכבוד · סבב חדש?';
          els.status.classList.add('done');
          els.toggle.textContent = 'שוב';
          beep();
        }

        function loop(now) {
          if (!running) return;
          var ms = elapsed + (now - lastStart);
          if (ms >= DURATION) {
            finish();
            return;
          }
          setCount(tick(ms, DURATION));
          raf = requestAnimationFrame(loop);
        }

        function start() {
          if (running) return;
          if (elapsed >= DURATION) {
            reset();
          }
          running = true;
          els.count.classList.remove('done');
          els.status.classList.remove('done');
          els.reset.classList.remove('hidden');
          els.status.textContent = 'רץ...';
          els.toggle.textContent = 'השהה';
          lastStart = performance.now();
          raf = requestAnimationFrame(loop);
        }

        function pause() {
          if (!running) return;
          running = false;
          elapsed += performance.now() - lastStart;
          cancelAnimationFrame(raf);
          els.status.textContent = 'מושהה';
          els.toggle.textContent = 'המשך';
        }

        function reset() {
          running = false;
          elapsed = 0;
          lastShown = -1;
          cancelAnimationFrame(raf);
          els.count.classList.remove('done');
          els.status.classList.remove('done');
          els.reset.classList.add('hidden');
          setCount(tick(0, DURATION));
          els.status.textContent = 'לחצו התחל';
          els.toggle.textContent = 'התחל';
        }

        els.toggle.addEventListener('click', function () {
          if (running) {
            pause();
          } else {
            start();
          }
        });
        els.reset.addEventListener('click', reset);

        // keyboard niceties
        document.addEventListener('keydown', function (e) {
          if (e.code === 'Space' || e.key === ' ') {
            e.preventDefault();
            if (running) {
              pause();
            } else {
              start();
            }
          } else if (e.key === 'r' || e.key === 'R') {
            reset();
          }
        });

        // initial paint
        setCount(tick(0, DURATION));
      })();
    </script>
  </body>
</html>
