<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>דוגרי · ניהול הזמנות</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#8ca287" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="דוגרי" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="/css/tokens.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Heebo', Arial, sans-serif;
        background: #f7f4ef;
        color: #23201c;
        padding: 22px 16px 60px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .nav a {
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid #e4ddd0;
        background: #fff;
        color: #5c7357;
        border-radius: 99px;
        padding: 6px 14px;
      }
      .nav a.active {
        background: #8ca287;
        border-color: #8ca287;
        color: #fff;
      }
      h1 {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 4px;
      }
      .sub {
        color: #6b645b;
        margin-bottom: 18px;
      }
      .msg {
        background: #fff;
        border: 1px solid #e4ddd0;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
      }
      /* Safety net: if the table ever can't shrink far enough, scroll inside
         this box rather than widening the page (which would push the
         controls/tabs off a narrow mobile viewport). With the fixed layout +
         wrapping below the table already fits, so this rarely engages. */
      #content {
        max-width: 100%;
        overflow-x: auto;
      }
      table {
        width: 100%;
        max-width: 100%;
        /* Fixed layout: columns share the width evenly and never grow past the
           container, so long values wrap instead of forcing a side-scroll. */
        table-layout: fixed;
        border-collapse: collapse;
        background: #fff;
        border: 1px solid #e4ddd0;
        border-radius: 14px;
        overflow: hidden;
        font-size: 14px;
      }
      th,
      td {
        text-align: right;
        padding: 8px 8px;
        border-bottom: 1px solid #efe9df;
        vertical-align: top;
        /* Let long emails / word-lists / collect links wrap anywhere instead of
           blowing the column (and the table) wide. */
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      th {
        background: #f3e6e3;
        color: #5c7357;
        font-size: 12.5px;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .pill {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 99px;
        font-weight: 700;
        font-size: 12.5px;
      }
      .open {
        background: #e6f6ee;
        color: #1f7a4d;
      }
      .closed {
        background: #f3e6e3;
        color: #6f8a6a;
      }
      .expired {
        background: #efe9df;
        color: #6b645b;
      }
      .prod-error {
        background: #f3e6e3;
        color: #6f8a6a;
        cursor: help;
      }
      button {
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid #8ca287;
        background: #fff;
        color: #8ca287;
        border-radius: 9px;
        padding: 6px 10px;
        margin: 2px 0;
      }
      .muted {
        color: #6b645b;
        font-size: 12.5px;
      }
      .contact {
        direction: ltr;
        text-align: right;
        unicode-bidi: plaintext;
      }
      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }
      .stat {
        background: #fff;
        border: 1px solid #e4ddd0;
        border-radius: 12px;
        padding: 10px 16px;
        min-width: 110px;
      }
      .stat .val {
        font-size: 22px;
        font-weight: 900;
        color: #5c7357;
      }
      .stat .lab {
        font-size: 12.5px;
        color: #6b645b;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tab {
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid #e4ddd0;
        background: #fff;
        color: #5c7357;
        border-radius: 99px;
        padding: 6px 12px;
        margin: 0;
      }
      .tab.active {
        background: #8ca287;
        border-color: #8ca287;
        color: #fff;
      }
      .sortwrap {
        font-size: 13px;
        color: #6b645b;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .sortwrap select {
        font: inherit;
        font-size: 13px;
        border: 1px solid #e4ddd0;
        border-radius: 9px;
        padding: 5px 8px;
        background: #fff;
        color: #23201c;
      }
      .followup {
        display: inline-flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      a.act {
        display: inline-block;
        font-size: 12.5px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid #e4ddd0;
        color: #4b463d;
        border-radius: 8px;
        padding: 4px 8px;
        white-space: nowrap;
      }
      a.act.wa {
        border-color: #25d366;
        color: #128c3e;
      }
      button.danger {
        border-color: #6f8a6a;
        color: #6f8a6a;
      }
      .cancelled {
        background: #efe9df;
        color: #6b645b;
      }
      /* Narrow phones: 15 columns can't fit as a grid, so stack each row into a
         label:value card. The label comes from each cell's data-label (set in
         JS). This keeps every value on-screen with zero horizontal scroll. */
      @media (max-width: 600px) {
        #content {
          overflow-x: visible;
        }
        table {
          border: none;
          background: transparent;
        }
        thead {
          /* Off-screen but accessible; the per-cell labels replace it visually. */
          position: absolute;
          width: 1px;
          height: 1px;
          overflow: hidden;
          clip: rect(0 0 0 0);
        }
        table,
        tbody,
        tr,
        td {
          display: block;
          width: 100%;
        }
        tr {
          background: #fff;
          border: 1px solid #e4ddd0;
          border-radius: 14px;
          margin-bottom: 12px;
          padding: 4px 12px;
          overflow: hidden;
        }
        tr:last-child td {
          border-bottom: 1px solid #efe9df;
        }
        td {
          display: flex;
          justify-content: space-between;
          gap: 12px;
          padding: 8px 0;
        }
        td:last-child {
          border-bottom: none;
        }
        td::before {
          content: attr(data-label);
          font-weight: 700;
          color: #5c7357;
          font-size: 12.5px;
          flex: 0 0 auto;
        }
        /* Cells with no label (e.g. empty ones) shouldn't reserve label space. */
        td:not([data-label])::before {
          content: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav" id="nav">
        <a data-page="dashboard.html">לוח בקרה</a>
        <a data-page="admin.html" class="active">ניהול הזמנות</a>
        <a data-page="coupons.html">ניהול קופונים</a>
        <a data-page="design-codes.html">קודי עיצוב</a>
        <a data-page="admin-templates.html">תבנית חדשה</a>
      </nav>
      <h1>ניהול הזמנות · דוגרי</h1>
      <div class="sub" id="sub">טוען…</div>
      <div class="stats" id="stats"></div>
      <div class="controls" id="controls" hidden>
        <div class="tabs" id="tabs"></div>
        <label class="sortwrap"
          >מיון:
          <select id="sort">
            <option value="created">נוצר</option>
            <option value="words">מס׳ מילים</option>
            <option value="total">סכום</option>
          </select>
        </label>
      </div>
      <div id="content"></div>
    </div>

    <script type="module">
      import { buildBulkCsv } from './js/collect.js';

      const key = new URLSearchParams(location.search).get('key') || '';
      // Carry the admin key across the three linked admin pages.
      for (const a of document.querySelectorAll('#nav a')) {
        a.href = a.dataset.page + (key ? '?key=' + encodeURIComponent(key) : '');
      }
      const sub = document.getElementById('sub');
      const content = document.getElementById('content');
      const statsEl = document.getElementById('stats');
      const controlsEl = document.getElementById('controls');
      const tabsEl = document.getElementById('tabs');
      const sortSelect = document.getElementById('sort');

      // Last fetched list + current view state (client-side filter/sort).
      let allCols = [];
      let activeFilter = 'all';
      let sortBy = 'created';

      function fmtDate(iso) {
        try {
          return new Date(iso).toLocaleString('he-IL', {
            day: '2-digit',
            month: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
          });
        } catch {
          return iso;
        }
      }
      const statusLabel = {
        open: 'פתוח',
        closed: 'נסגר ✅',
        expired: 'הסתיים',
        cancelled: 'מבוטלת',
      };

      // Israeli phone -> international digits for wa.me: strip non-digits, and a
      // leading 0 (local trunk prefix) becomes the 972 country code.
      function intlPhone(phone) {
        const digits = String(phone || '').replace(/\D/g, '');
        if (!digits) return '';
        return digits.startsWith('0') ? '972' + digits.slice(1) : digits;
      }

      const isPaid = (c) => !!(c.order && c.order.paid);

      // Filter tabs: id, Hebrew label, and the predicate over a collection.
      const FILTERS = [
        { id: 'all', label: 'הכל', match: () => true },
        { id: 'leads', label: 'לידים', match: (c) => !c.cancelled && !isPaid(c) },
        { id: 'paid', label: 'שולמו', match: (c) => isPaid(c) },
        {
          id: 'closed',
          label: 'סגורות',
          match: (c) => c.status === 'closed' || c.status === 'expired',
        },
        { id: 'cancelled', label: 'מבוטלות', match: (c) => !!c.cancelled },
      ];

      function sortCols(cols) {
        const arr = [...cols];
        if (sortBy === 'words') arr.sort((a, b) => (b.word_count || 0) - (a.word_count || 0));
        else if (sortBy === 'total')
          arr.sort((a, b) => ((b.order && b.order.total) || 0) - ((a.order && a.order.total) || 0));
        else arr.sort((a, b) => String(b.created_at).localeCompare(String(a.created_at)));
        return arr;
      }
      const versionLabel = {
        pdf: 'דיגיטלי',
        pickup: 'משחק מוכן (איסוף)',
        delivery: 'המפונקת (משלוח)',
        custom: 'עיצוב אישי (בהתאמה)',
      };

      function formatAddress(a) {
        if (!a) return '';
        const parts = [a.street, a.city, a.postal];
        if (a.apartment) parts.push('דירה ' + a.apartment);
        if (a.floor) parts.push('קומה ' + a.floor);
        return parts.filter(Boolean).join(', ');
      }

      function ownerUrl(c) {
        return location.origin + '/collect.html?c=' + c.id + '&k=' + c.owner_token;
      }

      async function downloadCsv(c) {
        const r = await fetch('/api/collections/' + c.id);
        const data = await r.json();
        const csv = buildBulkCsv((data.words || []).map((w) => w.text));
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'dugri-' + (c.honoree_name || 'order') + '.csv';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      // Key-gated admin write (cancel/restore/delete). Returns true on success.
      async function adminAction(method, pathFor, body) {
        try {
          const r = await fetch(
            pathFor + (pathFor.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(key),
            {
              method,
              headers: body ? { 'Content-Type': 'application/json' } : undefined,
              body: body ? JSON.stringify(body) : undefined,
            }
          );
          return r.ok;
        } catch {
          return false;
        }
      }

      function renderStats(cols) {
        const leads = cols.filter((c) => !c.cancelled).length;
        const orders = cols.filter((c) => c.order).length;
        const paid = cols.filter((c) => isPaid(c)).length;
        const revenue = cols.reduce((s, c) => s + (isPaid(c) ? c.order.total || 0 : 0), 0);
        const pending = cols.filter(
          (c) => (c.order || c.word_count > 0) && !isPaid(c) && !c.cancelled
        ).length;
        const items = [
          ['לידים', leads],
          ['הזמנות', orders],
          ['שולמו', paid],
          ['הכנסות', revenue + ' ₪'],
          ['ממתינות לתשלום', pending],
        ];
        statsEl.textContent = '';
        for (const [lab, val] of items) {
          const box = document.createElement('div');
          box.className = 'stat';
          const v = document.createElement('div');
          v.className = 'val';
          v.textContent = val;
          const l = document.createElement('div');
          l.className = 'lab';
          l.textContent = lab;
          box.appendChild(v);
          box.appendChild(l);
          statsEl.appendChild(box);
        }
      }

      function renderTabs(cols) {
        tabsEl.textContent = '';
        for (const f of FILTERS) {
          const count = cols.filter(f.match).length;
          const btn = document.createElement('button');
          btn.className = 'tab' + (activeFilter === f.id ? ' active' : '');
          btn.textContent = f.label + ' (' + count + ')';
          btn.dataset.filter = f.id;
          btn.onclick = () => {
            activeFilter = f.id;
            renderAll();
          };
          tabsEl.appendChild(btn);
        }
      }

      function render(cols) {
        if (!cols.length) {
          content.innerHTML = '<div class="msg">אין רשומות להצגה.</div>';
          return;
        }
        const table = document.createElement('table');
        table.innerHTML =
          '<thead><tr><th>בעל/ת השמחה</th><th>לקוח</th><th>מילים</th><th>סטטוס</th><th>עיצוב</th><th>צבע</th><th>צ׳ייסרים</th><th>גרסה</th><th>סכום</th><th>כתובת</th><th>תשלום</th><th>הפקה</th><th>נוצר</th><th>מעקב</th><th>ניהול</th></tr></thead>';
        const tb = document.createElement('tbody');
        for (const c of cols) {
          const tr = document.createElement('tr');
          const contact = [c.owner_email, c.owner_phone].filter(Boolean).join(' · ') || '-';

          // Build cells with textContent - never innerHTML - since honoree_name /
          // email / phone are unsanitized user input (stored-XSS otherwise).
          const tdName = document.createElement('td');
          const strong = document.createElement('strong');
          strong.textContent = c.honoree_name || '-';
          tdName.appendChild(strong);

          const tdContact = document.createElement('td');
          tdContact.className = 'contact';
          tdContact.textContent = contact;

          const tdCount = document.createElement('td');
          tdCount.textContent = c.word_count;

          const tdStatus = document.createElement('td');
          const pill = document.createElement('span');
          pill.className = 'pill ' + (c.status || '');
          pill.textContent = statusLabel[c.status] || c.status;
          tdStatus.appendChild(pill);

          const tdDate = document.createElement('td');
          tdDate.className = 'muted';
          tdDate.textContent = fmtDate(c.created_at);

          const order = c.order || null;

          const tdDesign = document.createElement('td');
          tdDesign.textContent = c.design || '—';

          const tdColor = document.createElement('td');
          tdColor.textContent = c.color || '—';

          // Optional drinking-game add-on: show a small badge when chosen.
          const tdChasers = document.createElement('td');
          if (c.chasers) {
            const badge = document.createElement('span');
            badge.className = 'pill closed';
            badge.textContent = '✓';
            tdChasers.appendChild(badge);
          } else {
            tdChasers.className = 'muted';
            tdChasers.textContent = '—';
          }

          const tdVersion = document.createElement('td');
          tdVersion.textContent = order ? versionLabel[order.version] || order.version : '—';

          const tdTotal = document.createElement('td');
          tdTotal.textContent = order ? order.total + ' ₪' : '—';

          const tdAddress = document.createElement('td');
          tdAddress.textContent =
            order && order.version === 'delivery' ? formatAddress(order.address) : '—';

          const tdPaid = document.createElement('td');
          if (!order) {
            tdPaid.className = 'muted';
            tdPaid.textContent = 'טרם הוזמן';
          } else if (order.paid) {
            const badge = document.createElement('span');
            badge.className = 'pill open';
            badge.textContent = 'שולם ✅';
            tdPaid.appendChild(badge);
          } else {
            const payBtn = document.createElement('button');
            payBtn.textContent = 'סמן כשולם';
            payBtn.onclick = async () => {
              payBtn.disabled = true;
              try {
                const r = await fetch(
                  '/api/admin/collections/' + c.id + '/paid?key=' + encodeURIComponent(key),
                  { method: 'POST' }
                );
                if (r.ok) {
                  tdPaid.textContent = '';
                  const badge = document.createElement('span');
                  badge.className = 'pill open';
                  badge.textContent = 'שולם ✅';
                  tdPaid.appendChild(badge);
                } else {
                  payBtn.disabled = false;
                }
              } catch {
                payBtn.disabled = false;
              }
            };
            tdPaid.appendChild(payBtn);
          }

          // Production state ("הפקה"): the outcome of the last generate attempt.
          // error -> red pill, the problems as tooltip + a one-line summary;
          // generated -> a keyed download link; pending/none -> a muted dash.
          const prod = (c.order && c.order.production) || c.production || null;
          const tdProduction = document.createElement('td');
          if (prod && prod.state === 'error') {
            const errs = Array.isArray(prod.errors)
              ? prod.errors
              : prod.errors
                ? [prod.errors]
                : [];
            const badge = document.createElement('span');
            badge.className = 'pill prod-error';
            badge.textContent = 'שגיאה';
            if (errs.length) badge.title = errs.join('\n');
            tdProduction.appendChild(badge);
            if (errs.length) {
              const small = document.createElement('div');
              small.className = 'muted';
              small.textContent = errs[0];
              tdProduction.appendChild(small);
            }
          } else if (prod && prod.state === 'generated') {
            const a = document.createElement('a');
            a.className = 'act';
            a.textContent = 'מוכן ✓';
            a.href =
              location.origin +
              '/api/admin/collections/' +
              c.id +
              '/pdf?key=' +
              encodeURIComponent(key);
            a.target = '_blank';
            a.rel = 'noopener';
            tdProduction.appendChild(a);
          } else if (prod && prod.state === 'needs_design') {
            // Bespoke custom order: paid, awaiting hand-design (no template).
            const badge = document.createElement('span');
            badge.className = 'pill prod-error';
            badge.textContent = 'עיצוב אישי — לעצב';
            badge.title = 'הזמנה בהתאמה אישית — דורשת עיצוב ידני';
            tdProduction.appendChild(badge);
          } else {
            tdProduction.className = 'muted';
            tdProduction.textContent = prod && prod.state === 'pending' ? 'ממתין' : '—';
          }

          tr.appendChild(tdName);
          tr.appendChild(tdContact);
          tr.appendChild(tdCount);
          tr.appendChild(tdStatus);
          tr.appendChild(tdDesign);
          tr.appendChild(tdColor);
          tr.appendChild(tdChasers);
          tr.appendChild(tdVersion);
          tr.appendChild(tdTotal);
          tr.appendChild(tdAddress);
          tr.appendChild(tdPaid);
          tr.appendChild(tdProduction);
          tr.appendChild(tdDate);

          // Follow-up: WhatsApp / Call / Email. Each link is shown only when the
          // underlying contact field exists.
          const tdFollow = document.createElement('td');
          const follow = document.createElement('div');
          follow.className = 'followup';
          const intl = intlPhone(c.owner_phone);
          if (intl) {
            const wa = document.createElement('a');
            wa.className = 'act wa';
            wa.textContent = 'וואטסאפ';
            wa.href = 'https://wa.me/' + intl;
            wa.target = '_blank';
            wa.rel = 'noopener';
            follow.appendChild(wa);
          }
          if (c.owner_phone) {
            const call = document.createElement('a');
            call.className = 'act';
            call.textContent = 'חיוג';
            call.href = 'tel:' + String(c.owner_phone).replace(/\s/g, '');
            follow.appendChild(call);
          }
          if (c.owner_email) {
            const mail = document.createElement('a');
            mail.className = 'act';
            mail.textContent = 'מייל';
            mail.href = 'mailto:' + c.owner_email;
            follow.appendChild(mail);
          }
          if (!follow.children.length) {
            tdFollow.className = 'muted';
            tdFollow.textContent = '—';
          } else {
            tdFollow.appendChild(follow);
          }
          tr.appendChild(tdFollow);

          const td = document.createElement('td');
          const copyBtn = document.createElement('button');
          copyBtn.textContent = 'העתק קישור ניהול';
          copyBtn.onclick = () =>
            navigator.clipboard.writeText(ownerUrl(c)).then(() => {
              copyBtn.textContent = 'הועתק ✓';
              setTimeout(() => (copyBtn.textContent = 'העתק קישור ניהול'), 1500);
            });
          const csvBtn = document.createElement('button');
          csvBtn.textContent = 'CSV';
          csvBtn.onclick = () => downloadCsv(c);
          td.appendChild(copyBtn);
          td.appendChild(document.createTextNode(' '));
          td.appendChild(csvBtn);

          // Generate the print-ready PDF from the collected words. The admin
          // supplies the theme (a themes.json key) — design->theme mapping is a
          // later workstream. On success shows a download link + production state.
          // `prod` (the last production result) was computed above for the הפקה column.
          const genBtn = document.createElement('button');
          genBtn.textContent = 'צור PDF';
          const pdfWrap = document.createElement('span');
          const showPdf = () => {
            pdfWrap.textContent = ' ';
            const a = document.createElement('a');
            a.className = 'act';
            a.textContent = 'הורד PDF';
            a.href =
              location.origin +
              '/api/admin/collections/' +
              c.id +
              '/pdf?key=' +
              encodeURIComponent(key);
            a.target = '_blank';
            a.rel = 'noopener';
            pdfWrap.appendChild(a);
          };
          genBtn.onclick = async () => {
            // Default to the RESOLVED generator theme key stored on the order/
            // collection — never c.design (the Hebrew display name, which is not a
            // themes.json key). Fall back to a known key only as a last resort.
            const defaultTheme =
              (c.order && c.order.theme) || c.theme || (prod && prod.theme) || 'trip comeback';
            const theme = prompt('מפתח תמה (themes.json key):', defaultTheme);
            if (!theme) return;
            const orig = genBtn.textContent;
            genBtn.disabled = true;
            genBtn.textContent = 'מייצר…';
            try {
              const r = await fetch(
                '/api/admin/collections/' + c.id + '/generate?key=' + encodeURIComponent(key),
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ theme }),
                }
              );
              const data = await r.json().catch(() => ({}));
              if (r.ok) {
                genBtn.textContent = 'צור PDF מחדש';
                genBtn.disabled = false;
                showPdf();
                // Refresh the "הפקה" cell to its generated state — it was built on
                // page load and would otherwise stay stale (— / שגיאה) until reload.
                tdProduction.textContent = '';
                tdProduction.className = '';
                const doneLink = document.createElement('a');
                doneLink.className = 'act';
                doneLink.textContent = 'מוכן ✓';
                doneLink.href =
                  location.origin +
                  '/api/admin/collections/' +
                  c.id +
                  '/pdf?key=' +
                  encodeURIComponent(key);
                doneLink.target = '_blank';
                doneLink.rel = 'noopener';
                tdProduction.appendChild(doneLink);
              } else {
                genBtn.textContent = orig;
                genBtn.disabled = false;
                alert('שגיאה ביצירת PDF: ' + (data.detail || data.error || r.status));
              }
            } catch {
              genBtn.textContent = orig;
              genBtn.disabled = false;
              alert('שגיאה ביצירת ה-PDF');
            }
          };
          td.appendChild(document.createTextNode(' '));
          td.appendChild(genBtn);
          td.appendChild(pdfWrap);
          if (prod && prod.state === 'generated') {
            genBtn.textContent = 'צור PDF מחדש';
            showPdf();
          }

          // Cancel / restore (soft) + hard delete.
          if (c.cancelled) {
            const badge = document.createElement('span');
            badge.className = 'pill cancelled';
            badge.textContent = 'מבוטלת';
            const restoreBtn = document.createElement('button');
            restoreBtn.textContent = 'שחזר';
            restoreBtn.onclick = async () => {
              restoreBtn.disabled = true;
              const ok = await adminAction('POST', '/api/admin/collections/' + c.id + '/cancel', {
                undo: true,
              });
              if (ok) load();
              else restoreBtn.disabled = false;
            };
            td.appendChild(document.createTextNode(' '));
            td.appendChild(badge);
            td.appendChild(document.createTextNode(' '));
            td.appendChild(restoreBtn);
          } else {
            // Closed (owner finished) or expired (deadline passed) collections
            // no longer accept words — offer a reopen so the customer can add
            // more. Reopen flips status back to open and extends the expiry.
            if (c.status === 'closed' || c.status === 'expired') {
              const reopenBtn = document.createElement('button');
              reopenBtn.textContent = 'פתח מחדש';
              reopenBtn.onclick = async () => {
                if (!confirm('לפתוח מחדש את איסוף המילים של ' + (c.honoree_name || '') + '?'))
                  return;
                reopenBtn.disabled = true;
                const ok = await adminAction(
                  'POST',
                  '/api/admin/collections/' + c.id + '/reopen',
                  {}
                );
                if (ok) load();
                else reopenBtn.disabled = false;
              };
              td.appendChild(document.createTextNode(' '));
              td.appendChild(reopenBtn);
            }

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = 'בטל';
            cancelBtn.onclick = async () => {
              if (!confirm('לבטל את ההזמנה של ' + (c.honoree_name || '') + '?')) return;
              cancelBtn.disabled = true;
              const ok = await adminAction(
                'POST',
                '/api/admin/collections/' + c.id + '/cancel',
                {}
              );
              if (ok) load();
              else cancelBtn.disabled = false;
            };
            td.appendChild(document.createTextNode(' '));
            td.appendChild(cancelBtn);
          }

          const delBtn = document.createElement('button');
          delBtn.className = 'danger';
          delBtn.textContent = 'מחק';
          delBtn.onclick = async () => {
            if (
              !confirm('למחוק לצמיתות את ' + (c.honoree_name || '') + ' וכל המילים? אין דרך חזרה.')
            )
              return;
            if (!confirm('בטוחים? המחיקה סופית.')) return;
            delBtn.disabled = true;
            const ok = await adminAction('DELETE', '/api/admin/collections/' + c.id, null);
            if (ok) load();
            else delBtn.disabled = false;
          };
          td.appendChild(document.createTextNode(' '));
          td.appendChild(delBtn);

          tr.appendChild(td);

          // Label each cell so the narrow-screen stacked-card layout (CSS
          // td::before) shows "label: value". Order matches the <thead> above.
          const cellLabels = [
            'בעל/ת השמחה',
            'לקוח',
            'מילים',
            'סטטוס',
            'עיצוב',
            'צבע',
            'צ׳ייסרים',
            'גרסה',
            'סכום',
            'כתובת',
            'תשלום',
            'הפקה',
            'נוצר',
            'מעקב',
            'ניהול',
          ];
          tr.querySelectorAll('td').forEach((cell, i) => {
            if (cellLabels[i]) cell.dataset.label = cellLabels[i];
          });

          tb.appendChild(tr);
        }
        table.appendChild(tb);
        content.innerHTML = '';
        content.appendChild(table);
      }

      // Re-render stats, tabs and the filtered+sorted table from allCols.
      function renderAll() {
        renderStats(allCols);
        renderTabs(allCols);
        const f = FILTERS.find((x) => x.id === activeFilter) || FILTERS[0];
        render(sortCols(allCols.filter(f.match)));
      }

      function hideControls() {
        statsEl.textContent = '';
        controlsEl.hidden = true;
      }

      sortSelect.onchange = () => {
        sortBy = sortSelect.value;
        renderAll();
      };

      async function load() {
        if (!key) {
          sub.textContent = '';
          hideControls();
          content.innerHTML =
            '<div class="msg">חסר מפתח גישה. פתחו עם <code>?key=…</code> בכתובת.</div>';
          return;
        }
        try {
          const r = await fetch('/api/admin/collections?key=' + encodeURIComponent(key));
          if (r.status === 403) {
            hideControls();
            content.innerHTML = '<div class="msg">מפתח גישה שגוי.</div>';
            sub.textContent = '';
            return;
          }
          const data = await r.json();
          allCols = data.collections || [];
          sub.textContent = allCols.length + ' הזמנות';
          controlsEl.hidden = false;
          renderAll();
        } catch (e) {
          hideControls();
          content.innerHTML = '<div class="msg">שגיאה בטעינה.</div>';
        }
      }
      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
