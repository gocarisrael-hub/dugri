<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Analytics (GA4) — loads after consent (js/consent.js) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('consent', 'default', { analytics_storage: 'denied' });
    </script>
    <script src="js/consent.js" defer></script>
    <script type="module" src="js/analytics.js"></script>
    <title>בונים את המשחק - דוגרי</title>
    <meta
      name="description"
      content="בוחרים עיצוב וצבעים למשחק דוגרי, רואים תצוגה חיה וממשיכים להזמנה."
    />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&family=Heebo:wght@500;700;800;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&family=Heebo:wght@500;700;800;900&display=swap"
      />
    </noscript>
    <style>
      :root {
        --bg: #fff5f8;
        --surface: #ffffff;
        --blush: #fbe8ee;
        --blush-deep: #f1d2dc;
        --ink: #2c1a29;
        --muted: #7c6a74;
        --wine: #9b2d54;
        --wine-deep: #7a1f40;
        --gold: #bc9a4c;
        --hot: #e5197d;
        --hot-deep: #c7106a;
        --line: #f0dee4;
        --font: 'Calibri', 'Carlito', 'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif;
        --display: 'Heebo', 'Calibri', 'Carlito', 'Segoe UI', 'Arial', sans-serif;
        --shadow-sm: 0 2px 8px rgba(44, 26, 41, 0.06), 0 1px 2px rgba(44, 26, 41, 0.04);
        --shadow-md: 0 10px 28px rgba(44, 26, 41, 0.1), 0 3px 8px rgba(44, 26, 41, 0.06);
        --shadow-lg: 0 26px 60px rgba(44, 26, 41, 0.16), 0 8px 18px rgba(44, 26, 41, 0.08);
        /* live palette tokens (configurator sets --c0..--cN on previews) */
        --accent: var(--hot);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--cfg-bg, var(--bg));
        transition: background 0.35s ease;
        color: var(--ink);
        line-height: 1.6;
        font-size: 17px;
        -webkit-font-smoothing: antialiased;
        padding-top: 60px;
        padding-bottom: 90px;
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 22px;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--display);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.015em;
      }
      a {
        color: inherit;
      }

      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 17.5px;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 16px 32px;
        border-radius: 999px;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(229, 25, 125, 0.3);
        transition:
          transform 0.14s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
      }
      .btn::after {
        content: '';
        position: absolute;
        top: 0;
        inset-inline-start: -130%;
        width: 60%;
        height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.45), transparent);
        transform: skewX(-18deg);
        transition: inset-inline-start 0.55s ease;
      }
      .btn:hover::after {
        inset-inline-start: 130%;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 36px rgba(229, 25, 125, 0.4);
        filter: brightness(1.05);
      }
      .btn:active {
        transform: translateY(0) scale(0.99);
      }
      .btn:focus-visible {
        outline: 3px solid var(--hot);
        outline-offset: 3px;
      }
      a:focus-visible,
      button:focus-visible {
        outline: 3px solid var(--hot);
        outline-offset: 2px;
        border-radius: 8px;
      }

      /* ===== SHARED STICKY NAV ===== */
      .nav {
        position: fixed;
        top: 0;
        inset-inline: 0;
        z-index: 80;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 6px 20px rgba(44, 26, 41, 0.07);
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .nav-logo {
        display: flex;
        align-items: center;
      }
      .nav-logo img {
        height: 34px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-inline-start: auto;
      }
      .nav-links a {
        font-family: var(--display);
        font-weight: 800;
        font-size: 15.5px;
        color: var(--wine);
        padding: 8px 12px;
        border-radius: 10px;
        text-decoration: none;
        transition:
          background 0.18s ease,
          color 0.18s ease;
      }
      .nav-links a:hover {
        background: var(--blush);
        color: var(--wine-deep);
      }
      .nav-links a.nav-cta {
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        padding: 9px 20px;
        box-shadow: 0 6px 16px rgba(229, 25, 125, 0.26);
      }
      .nav-links a.nav-cta:hover {
        filter: brightness(1.05);
        color: #fff;
      }
      .nav-toggle {
        display: none;
        margin-inline-start: auto;
        background: none;
        border: 1px solid var(--blush-deep);
        border-radius: 10px;
        width: 42px;
        height: 40px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      .nav-toggle span,
      .nav-toggle span::before,
      .nav-toggle span::after {
        display: block;
        width: 20px;
        height: 2px;
        background: var(--wine);
        position: relative;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }
      .nav-toggle span::before {
        content: '';
        position: absolute;
        top: -6px;
      }
      .nav-toggle span::after {
        content: '';
        position: absolute;
        top: 6px;
      }
      @media (max-width: 640px) {
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 100%;
          inset-inline: 0;
          flex-direction: column;
          align-items: stretch;
          gap: 0;
          background: rgba(255, 255, 255, 0.98);
          border-bottom: 1px solid var(--line);
          box-shadow: 0 14px 28px rgba(44, 26, 41, 0.12);
          padding: 8px 14px 14px;
          margin: 0;
          display: none;
        }
        .nav-links.open {
          display: flex;
        }
        .nav-links a {
          padding: 13px 10px;
          border-radius: 10px;
        }
        .nav-links a.nav-cta {
          margin-top: 6px;
          text-align: center;
          justify-content: center;
        }
      }

      /* ===== CONFIGURATOR ===== */
      .cfg-head {
        text-align: center;
        padding: 26px 0 8px;
      }
      .cfg-head h1 {
        font-size: 32px;
        color: var(--ink);
      }
      .cfg-head p {
        color: var(--muted);
        margin-top: 6px;
        font-size: 16px;
      }
      .was {
        text-decoration: line-through;
        opacity: 0.55;
        font-weight: 700;
        margin-inline-end: 5px;
        font-size: 0.85em;
      }
      .plan-pill {
        display: inline-block;
        margin-top: 12px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 14px;
        color: var(--wine);
        background: var(--blush);
        padding: 7px 16px;
        border-radius: 999px;
      }

      /* layout: preview + controls. Colours sit right by the preview so they're
         always reachable without scrolling (two columns on wide screens). */
      .cfg-grid {
        display: grid;
        gap: 20px;
        max-width: 520px;
        margin: 18px auto 0;
      }
      .cfg-controls {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .cfg-grid .preview-card {
        margin: 0;
        max-width: none;
      }
      .cfg-grid .picker {
        margin: 0;
        max-width: none;
      }
      @media (min-width: 880px) {
        .cfg-grid {
          /* RTL: the first column track sits on the right. Put the controls
             there (natural for a Hebrew page) and the preview on the left. */
          grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
          align-items: start;
          max-width: 1040px;
          gap: 30px;
        }
        .cfg-controls {
          position: sticky;
          top: 76px;
          grid-column: 1;
        }
        .cfg-grid .preview-card {
          grid-column: 2;
        }
      }
      /* preview + tabs */
      .preview-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 18px;
        box-shadow: var(--shadow-md);
        max-width: 520px;
        margin: 18px auto 0;
      }
      .tabs {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 16px;
      }
      .tab {
        font-family: var(--display);
        font-weight: 800;
        font-size: 15.5px;
        color: var(--wine);
        background: var(--blush);
        border: 1px solid var(--blush-deep);
        border-radius: 999px;
        padding: 9px 22px;
        cursor: pointer;
        transition: all 0.18s ease;
      }
      .tab:hover {
        background: var(--blush-deep);
      }
      .tab[aria-selected='true'] {
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 8px 18px rgba(229, 25, 125, 0.26);
      }
      .preview-stage {
        position: relative;
        border-radius: 16px;
        background:
          radial-gradient(
            70% 70% at 50% 0%,
            color-mix(in srgb, var(--accent, #e5197d) 16%, transparent),
            transparent 70%
          ),
          var(--cfg-bg, var(--bg));
        border: 1px dashed var(--blush-deep);
        min-height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        overflow: hidden;
      }
      .preview-panel {
        display: none;
        width: 100%;
      }
      .preview-panel[data-active='true'] {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* subtle centered brand watermark over the live card/board preview */
      .preview-panel[data-active='true']::after {
        content: '';
        position: absolute;
        inset: 0;
        background: url('assets/logo.png') center / 42% no-repeat;
        opacity: 0.16;
        pointer-events: none;
      }
      .preview-panel svg {
        width: 100%;
        height: auto;
        max-height: 420px;
        display: block;
        filter: drop-shadow(0 14px 30px rgba(44, 26, 41, 0.16));
      }
      /* live honoree-name overlay - only on the FRONT face, sits near the top
         centre of the card, above the design but it coexists with the watermark. */
      .name-overlay {
        position: absolute;
        top: 30%;
        inset-inline: 0;
        z-index: 3;
        display: none;
        justify-content: center;
        pointer-events: none;
      }
      .name-overlay > span {
        max-width: 78%;
        padding: 5px 16px;
        border-radius: 999px;
        background: rgba(20, 8, 16, 0.55);
        font-family: var(--display);
        font-weight: 900;
        font-size: clamp(17px, 4.6vw, 30px);
        line-height: 1.15;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
        word-break: break-word;
        text-align: center;
      }
      .preview-panel[data-panel='front'][data-active='true'] .name-overlay.has-name {
        display: flex;
      }
      .preview-panel img {
        width: 100%;
        height: auto;
        max-height: 420px;
        object-fit: contain;
        display: block;
      }
      .preview-empty {
        color: var(--muted);
        font-size: 15px;
        text-align: center;
      }

      /* mobile: keep the preview compact so the colour row stays in view.
         Placed AFTER the base preview rules so plain cascade order wins -
         no .cfg-grid qualifier needed to out-specify them. */
      @media (max-width: 600px) {
        .cfg-head {
          padding: 14px 0 4px;
        }
        .cfg-head h1 {
          font-size: 25px;
        }
        .preview-stage {
          min-height: 200px;
        }
        .preview-panel svg,
        .preview-panel img {
          max-height: 300px;
        }
      }

      /* pickers */
      .picker {
        margin: 26px auto 0;
        max-width: 760px;
      }
      .picker h2 {
        font-size: 19px;
        text-align: center;
        margin-bottom: 14px;
        color: var(--ink);
      }
      .name-picker #honoreeName {
        display: block;
        width: 100%;
        font: inherit;
        font-weight: 700;
        text-align: center;
        padding: 12px 14px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        color: var(--ink);
      }
      .name-picker #honoreeName:focus {
        outline: 2px solid var(--hot);
        border-color: var(--hot);
      }
      .name-picker .name-hint {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--muted);
        text-align: center;
      }
      .designs {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: stretch;
        gap: 12px;
      }
      .design {
        flex: 0 1 130px;
        max-width: 150px;
        background: var(--surface);
        border: 2px solid var(--line);
        border-radius: 16px;
        padding: 10px;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .design:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md);
      }
      .design[aria-pressed='true'] {
        border-color: var(--hot);
        box-shadow:
          0 0 0 3px rgba(229, 25, 125, 0.18),
          var(--shadow-md);
      }
      .design .thumb {
        width: 100%;
        aspect-ratio: 5/7;
        border-radius: 10px;
        overflow: hidden;
        background: var(--blush);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .design .thumb svg,
      .design .thumb img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .design .dname {
        font-family: var(--display);
        font-weight: 800;
        font-size: 13.5px;
        color: var(--wine-deep);
        text-align: center;
      }

      .colors {
        display: flex;
        column-gap: 14px;
        row-gap: 30px;
        justify-content: center;
        align-items: flex-start;
        flex-wrap: wrap;
        padding-bottom: 22px;
      }
      .swatch {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        cursor: pointer;
        border: 3px solid #fff;
        box-shadow:
          0 0 0 1px var(--line),
          var(--shadow-sm);
        transition:
          transform 0.16s ease,
          box-shadow 0.2s ease;
        position: relative;
      }
      .swatch:hover {
        transform: scale(1.08);
      }
      .swatch[aria-pressed='true'] {
        box-shadow:
          0 0 0 3px var(--ink),
          var(--shadow-md);
        transform: scale(1.06);
      }
      .swatch .cname {
        position: absolute;
        inset-inline: 0;
        top: 54px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        white-space: nowrap;
        text-align: center;
      }
      .raster-note {
        margin-top: 6px;
        font-size: 12.5px;
        line-height: 1.4;
        color: var(--muted);
        text-align: center;
      }

      /* sticky continue bar */
      .continue-bar {
        position: fixed;
        bottom: 0;
        inset-inline: 0;
        z-index: 70;
        background: rgba(255, 255, 255, 0.96);
        border-top: 1px solid var(--line);
        backdrop-filter: blur(8px);
        box-shadow: 0 -8px 24px rgba(44, 26, 41, 0.08);
        padding: 12px 16px;
      }
      .continue-inner {
        max-width: 1000px;
        margin: 0 auto;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .continue-summary {
        font-family: var(--display);
        font-weight: 800;
        font-size: 14.5px;
        color: var(--wine-deep);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .continue-bar .btn {
        flex: 0 0 auto;
      }
      @media (max-width: 560px) {
        .continue-summary {
          display: none;
        }
        .continue-bar .btn {
          flex: 1;
          width: 100%;
        }
      }

      .back {
        text-align: center;
        margin: 30px 0 6px;
        font-size: 14px;
      }
      .back a {
        color: var(--wine);
        font-weight: 700;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        * {
          transition-duration: 0.001ms !important;
        }
      }
    </style>
    <script src="js/demo-banner.js" defer></script>
  </head>
  <body>
    <!-- shared sticky nav -->
    <nav class="nav" aria-label="ניווט ראשי">
      <div class="nav-inner">
        <a class="nav-logo" href="index.html#top" aria-label="דוגרי - לעמוד הבית"
          ><img src="assets/logo.png" alt="דוגרי"
        /></a>
        <button
          class="nav-toggle"
          type="button"
          data-testid="nav-toggle"
          aria-expanded="false"
          aria-controls="navLinks"
          aria-label="תפריט"
        >
          <span></span>
        </button>
        <div class="nav-links" id="navLinks" data-testid="nav-links">
          <a href="index.html#examples">דוגמאות</a>
          <a href="index.html#pricing">מחירים</a>
          <a href="timer.html">טיימר</a>
          <a class="nav-cta" href="options.html">הזמנה</a>
        </div>
      </div>
    </nav>

    <main class="wrap" data-testid="configurator">
      <div class="cfg-head">
        <h1>בונים את המשחק שלכם</h1>
        <p>בוחרים עיצוב וצבע - והכל מתעדכן לנגד עיניכם.</p>
        <div class="plan-pill" data-testid="plan-pill">
          חבילה: <span id="planName">בסיס</span> · <s class="was">129</s
          ><span id="planPrice" data-testid="plan-price">79</span>₪
        </div>
      </div>

      <div class="cfg-grid">
        <!-- LIVE PREVIEW -->
        <section class="preview-card" data-testid="preview">
          <div class="tabs" role="tablist" aria-label="תצוגה">
            <button
              class="tab"
              role="tab"
              data-tab="front"
              data-testid="tab-front"
              aria-selected="true"
            >
              קלף
            </button>
            <button
              class="tab"
              role="tab"
              data-tab="back"
              data-testid="tab-back"
              aria-selected="false"
            >
              גב
            </button>
            <button
              class="tab"
              role="tab"
              data-tab="board"
              data-testid="tab-board"
              aria-selected="false"
            >
              לוח
            </button>
          </div>
          <div class="preview-stage" id="previewStage" data-testid="preview-stage">
            <div
              class="preview-panel"
              data-panel="front"
              data-testid="preview-front"
              data-active="true"
            >
              <div class="name-overlay" id="nameOverlay" data-testid="name-overlay"></div>
            </div>
            <div class="preview-panel" data-panel="back" data-testid="preview-back"></div>
            <div class="preview-panel" data-panel="board" data-testid="preview-board"></div>
            <div class="preview-empty" id="previewEmpty" hidden>טוען תצוגה…</div>
          </div>
        </section>

        <div class="cfg-controls">
          <!-- HONOREE NAME (shown live on the front card preview) -->
          <section class="picker name-picker">
            <h2>שם בעל/ת השמחה</h2>
            <input
              type="text"
              id="honoreeName"
              data-testid="honoree-name"
              maxlength="40"
              placeholder="לדוגמה: נועה"
              autocomplete="off"
              aria-describedby="honoreeHint"
            />
            <p class="name-hint" id="honoreeHint">כתבו את השם בדיוק כפי שתרצו שיופיע על הקלף</p>
          </section>

          <!-- COLOR PICKER (right by the preview - change colours without scrolling) -->
          <section class="picker">
            <h2>בחרו צבע ראשי</h2>
            <div
              class="colors"
              id="colorList"
              data-testid="color-list"
              role="group"
              aria-label="צבעים"
            ></div>
            <p class="raster-note" id="rasterNote" data-testid="raster-note" hidden>
              הרקע בעיצוב זה קבוע ולא משתנה עם הצבע
            </p>
          </section>

          <!-- DESIGN PICKER -->
          <section class="picker">
            <h2>בחרו עיצוב</h2>
            <div
              class="designs"
              id="designList"
              data-testid="design-list"
              role="group"
              aria-label="עיצובים"
            ></div>
          </section>
        </div>
      </div>

      <p class="back"><a href="index.html#top">חזרה לעמוד הבית ←</a></p>
    </main>

    <!-- STICKY CONTINUE -->
    <div class="continue-bar">
      <div class="continue-inner">
        <div class="continue-summary" id="continueSummary" data-testid="continue-summary"></div>
        <button class="btn" id="continueBtn" type="button" data-testid="continue-btn">
          להזמנה ולתשלום · <s class="was">129</s><span id="continuePrice">79</span>₪
        </button>
      </div>
    </div>

    <script type="module">
      import { DESIGNS, MAIN_COLORS } from './js/designs.js';
      import {
        applyPalette,
        applyOriginal,
        mainAnchor,
        lightTint,
        buildOrder,
        validateManifest,
      } from './js/configurator.js';
      import { track } from './js/analytics.js';

      // Validate the manifest once at load. Don't hard-crash the page on a bad
      // manifest - just surface a clear console error so it's caught in dev/CI.
      try {
        const manifestErrors = validateManifest(DESIGNS, MAIN_COLORS);
        if (manifestErrors.length) {
          console.error('Invalid designs manifest:\n' + manifestErrors.join('\n'));
        }
      } catch (e) {
        console.error('Manifest validation failed to run:', e);
      }

      /* ---- nav toggle (mobile) ---- */
      (function () {
        const toggle = document.querySelector('.nav-toggle');
        const links = document.getElementById('navLinks');
        if (toggle && links) {
          toggle.addEventListener('click', () => {
            const open = links.classList.toggle('open');
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          });
        }
      })();

      /* ---- plan from query ---- */
      const PLANS = {
        base: { name: 'החבילה המלאה', price: 79 },
      };
      const params = new URLSearchParams(location.search);
      let plan = 'base';

      function paintPlan() {
        const p = PLANS[plan];
        document.getElementById('planName').textContent = p.name;
        document.getElementById('planPrice').textContent = p.price;
        document.getElementById('continuePrice').textContent = p.price;
      }
      paintPlan();

      /* ---- state ---- */
      let designIndex = 0;
      let colorIndex = -1; // -1 = the design's original colors (default)
      let activeTab = 'front';
      let honoreeName = '';

      // cache of fetched raw SVG text keyed by path
      const svgCache = new Map();
      async function loadSvg(path) {
        if (svgCache.has(path)) return svgCache.get(path);
        const p = fetch(path).then((r) =>
          r.ok ? r.text() : Promise.reject(new Error('svg ' + r.status))
        );
        svgCache.set(path, p);
        return p;
      }

      const panels = {
        front: document.querySelector('[data-panel="front"]'),
        back: document.querySelector('[data-panel="back"]'),
        board: document.querySelector('[data-panel="board"]'),
      };
      const nameOverlay = document.getElementById('nameOverlay');

      // keep the live name overlay in sync with the typed value
      function renderName() {
        if (!nameOverlay) return;
        const name = honoreeName.trim();
        nameOverlay.innerHTML = name ? '<span></span>' : '';
        if (name) nameOverlay.firstChild.textContent = name;
        nameOverlay.classList.toggle('has-name', !!name);
      }

      // inline all three product SVGs of the currently selected design
      async function renderDesign() {
        const d = DESIGNS[designIndex];
        if (!d) return;
        await Promise.all(
          Object.keys(panels).map(async (kind) => {
            const el = panels[kind];
            const path = d.products && d.products[kind];
            if (!path) {
              el.innerHTML = '';
              return;
            }
            try {
              el.innerHTML = await loadSvg(path);
            } catch (e) {
              el.innerHTML = '<div class="preview-empty">אין תצוגה</div>';
            }
          })
        );
        // the front panel's innerHTML was just replaced - restore the name overlay
        // so it keeps living above the freshly-inlined SVG.
        if (nameOverlay && panels.front && !panels.front.contains(nameOverlay)) {
          panels.front.appendChild(nameOverlay);
          renderName();
        }
        recolor();
      }

      // apply current color palette to every preview panel + page accent
      function recolor() {
        const d = DESIGNS[designIndex];
        if (!d) return;
        const anchors = d.anchors || [];
        // guard: applyOriginal/applyPalette throw on empty anchors - nothing to
        // recolor, so leave the previews as-is.
        if (!anchors.length) return;
        let activeMain = null;
        if (colorIndex < 0) {
          // original colors - apply the design's own anchors as-is
          Object.values(panels).forEach((el) => applyOriginal(el, anchors));
          activeMain = mainAnchor(anchors);
        } else {
          const color = MAIN_COLORS[colorIndex];
          if (!color) return;
          Object.values(panels).forEach((el) => applyPalette(el, color.hex, anchors));
          activeMain = color.hex;
        }
        // theme the page + stage background to the active color
        if (activeMain) {
          const root = document.documentElement.style;
          root.setProperty('--accent', activeMain);
          root.setProperty('--cfg-bg', lightTint(activeMain));
        }
      }

      /* ---- tabs ---- */
      function selectTab(tab) {
        activeTab = tab;
        document
          .querySelectorAll('.tab')
          .forEach((b) =>
            b.setAttribute('aria-selected', b.dataset.tab === tab ? 'true' : 'false')
          );
        Object.entries(panels).forEach(([k, el]) =>
          el.setAttribute('data-active', k === tab ? 'true' : 'false')
        );
      }
      document
        .querySelectorAll('.tab')
        .forEach((b) => b.addEventListener('click', () => selectTab(b.dataset.tab)));

      /* ---- honoree name (live overlay on the front card) ---- */
      const honoreeInput = document.getElementById('honoreeName');
      if (honoreeInput) {
        honoreeInput.addEventListener('input', () => {
          honoreeName = honoreeInput.value;
          renderName();
          persist();
        });
      }

      /* ---- build design thumbnails ---- */
      const designList = document.getElementById('designList');
      DESIGNS.forEach((d, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'design';
        btn.dataset.testid = 'design-' + i;
        btn.dataset.designId = d.id;
        btn.setAttribute('aria-pressed', i === 0 ? 'true' : 'false');
        btn.setAttribute('aria-label', d.name);
        btn.innerHTML = '<div class="thumb"></div><div class="dname">' + d.name + '</div>';
        designList.appendChild(btn);
        // inline the front svg as a small thumbnail, palette-applied with the first color
        const thumb = btn.querySelector('.thumb');
        const frontPath = d.products && d.products.front;
        if (frontPath) {
          loadSvg(frontPath)
            .then((txt) => {
              thumb.innerHTML = txt;
              // guard: applyOriginal throws on empty anchors - skip recolor
              if (d.anchors && d.anchors.length) applyOriginal(thumb, d.anchors);
            })
            .catch(() => {
              thumb.textContent = d.name;
            });
        }
        btn.addEventListener('click', () => selectDesign(i));
      });

      function selectDesign(i) {
        designIndex = i;
        colorIndex = -1; // always show a newly picked design in its original colors first
        document
          .querySelectorAll('.design')
          .forEach((el, idx) => el.setAttribute('aria-pressed', idx === i ? 'true' : 'false'));
        updateOrigChip();
        updateRasterNote();
        setActiveSwatch(-1);
        const d = DESIGNS[i] || {};
        track('select_design', { design: d.name || d.id || i });
        renderDesign().then(persist);
      }

      /* ---- build color swatches (original first, then main colors) ---- */
      const colorList = document.getElementById('colorList');

      // "מקורי" chip - the design's own colors (the default)
      const origBtn = document.createElement('button');
      origBtn.type = 'button';
      origBtn.className = 'swatch swatch-orig';
      origBtn.dataset.testid = 'color-orig';
      origBtn.dataset.colorId = 'original';
      origBtn.dataset.colorIndex = '-1';
      origBtn.setAttribute('aria-pressed', 'true');
      origBtn.setAttribute('aria-label', 'מקורי');
      origBtn.innerHTML = '<span class="cname">מקורי</span>';
      origBtn.addEventListener('click', () => selectColor(-1));
      colorList.appendChild(origBtn);

      MAIN_COLORS.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'swatch';
        btn.dataset.testid = 'color-' + i;
        btn.dataset.colorId = c.id;
        btn.dataset.colorIndex = String(i);
        btn.style.background = c.hex;
        btn.setAttribute('aria-pressed', 'false');
        btn.setAttribute('aria-label', c.name);
        btn.innerHTML = '<span class="cname">' + c.name + '</span>';
        btn.addEventListener('click', () => selectColor(i));
        colorList.appendChild(btn);
      });

      function setActiveSwatch(ci) {
        document
          .querySelectorAll('.swatch')
          .forEach((el) =>
            el.setAttribute('aria-pressed', el.dataset.colorIndex === String(ci) ? 'true' : 'false')
          );
      }

      // the "מקורי" chip reflects the current design's main color
      function updateOrigChip() {
        const d = DESIGNS[designIndex];
        if (!d || !d.anchors || !d.anchors.length) return;
        origBtn.style.background = mainAnchor(d.anchors);
      }

      // designs with a raster <image> background can't recolor that part - keep
      // recolor on for the vector parts but surface a subtle caption explaining it.
      const rasterNote = document.getElementById('rasterNote');
      function updateRasterNote() {
        const d = DESIGNS[designIndex];
        if (rasterNote) rasterNote.hidden = !(d && d.hasRaster);
      }

      function selectColor(ci) {
        colorIndex = ci;
        setActiveSwatch(ci);
        const c = ci < 0 ? { name: 'מקורי' } : MAIN_COLORS[ci] || {};
        track('select_color', { color: c.name || c.id || ci });
        recolor();
        persist();
      }

      /* ---- selection encoding / persistence ---- */
      function currentSelection() {
        const d = DESIGNS[designIndex] || {};
        const anchors = d.anchors || [];
        let colorId, colorName, mainHex;
        if (colorIndex < 0) {
          colorId = 'original';
          colorName = 'מקורי';
          mainHex = anchors.length ? mainAnchor(anchors) : '';
        } else {
          const c = MAIN_COLORS[colorIndex] || {};
          colorId = c.id || '';
          colorName = c.name || '';
          mainHex = c.hex || '';
        }
        return {
          plan,
          designId: d.id || '',
          designName: d.name || '',
          colorId,
          colorName,
          mainHex,
          honoreeName: honoreeName.trim(),
        };
      }

      function buildCurrentOrder() {
        const s = currentSelection();
        return buildOrder({
          plan: s.plan,
          designId: s.designId,
          designName: s.designName,
          colorName: s.colorName,
          mainHex: s.mainHex,
        });
      }

      function persist() {
        const s = currentSelection();
        try {
          localStorage.setItem('dugri_selection', JSON.stringify(s));
        } catch (e) {}
        // reflect in the URL so thankyou.html can read it without storage
        const url = new URL(location.href);
        url.searchParams.set('plan', s.plan);
        url.searchParams.set('design', s.designId);
        url.searchParams.set('color', s.colorId);
        if (s.honoreeName) url.searchParams.set('name', s.honoreeName);
        else url.searchParams.delete('name');
        history.replaceState(null, '', url);
        // refresh the continue button intent + summary
        let order;
        try {
          order = buildCurrentOrder();
        } catch (e) {
          order = null;
        }
        const btn = document.getElementById('continueBtn');
        if (order && order.whatsappUrl) {
          btn.dataset.waUrl = order.whatsappUrl;
        }
        document.getElementById('continueSummary').textContent =
          order && order.summary ? order.summary : s.designName + ' · ' + s.colorName;
      }

      /* ---- continue to (demo) checkout ---- */
      document.getElementById('continueBtn').addEventListener('click', () => {
        persist();
        track('begin_checkout');
        // Payment now lives on the collect page. Go straight to thankyou (create a
        // shared collection), then the owner pays from the collect page any time.
        window.location.href = 'thankyou.html' + location.search;
      });

      /* ---- init ---- */
      // restore a prior color choice from the URL if present
      (function restore() {
        const dId = params.get('design');
        const cId = params.get('color');
        // carried name: URL param wins, else a prior localStorage selection
        let carriedName = params.get('name') || '';
        if (!carriedName) {
          try {
            const saved = JSON.parse(localStorage.getItem('dugri_selection') || 'null');
            if (saved && saved.honoreeName) carriedName = saved.honoreeName;
          } catch (e) {}
        }
        if (carriedName) {
          honoreeName = carriedName;
          if (honoreeInput) honoreeInput.value = carriedName;
          renderName();
        }
        if (dId) {
          const di = DESIGNS.findIndex((d) => d.id === dId);
          if (di >= 0) designIndex = di;
        }
        if (cId && cId !== 'original') {
          const ci = MAIN_COLORS.findIndex((c) => c.id === cId);
          colorIndex = ci >= 0 ? ci : -1;
        } else {
          colorIndex = -1;
        }
        document
          .querySelectorAll('.design')
          .forEach((el, idx) =>
            el.setAttribute('aria-pressed', idx === designIndex ? 'true' : 'false')
          );
        updateOrigChip();
        updateRasterNote();
        setActiveSwatch(colorIndex);
      })();

      selectTab('front');
      renderDesign().then(persist);
    </script>
  </body>
</html>
