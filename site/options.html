<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אפשרויות — דוגרי</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&family=Heebo:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FFF5F8;--ink:#2C1A29;--muted:#7C6A74;--wine:#9B2D54;
    --font:'Calibri','Carlito','Segoe UI','Arial',sans-serif;
    --display:'Heebo','Calibri','Carlito','Arial',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:var(--bg);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px;text-align:center}
  img.logo{width:120px;height:auto;margin-bottom:18px}
  h1{font-family:var(--display);font-weight:900;font-size:30px;color:var(--wine)}
  p{color:var(--muted);margin-top:10px;font-size:17px}
  .back{margin-top:28px;font-size:14px}
  .back a{color:var(--wine);font-weight:700}
</style>
</head>
<body>
  <img class="logo" src="assets/logo.png" alt="דוגרי">
  <h1>אפשרויות</h1>
  <p>הדף בבנייה.</p>
  <p class="back"><a href="index.html">חזרה לדוגרי ←</a></p>
</body>
</html>
