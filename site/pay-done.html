<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>דוגרי · תשלום</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font);
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        text-align: center;
        padding: 24px;
      }
      .msg {
        font-size: 18px;
        font-weight: 700;
        font-family: var(--display);
      }
      .msg.ok {
        color: var(--sage-deep);
      }
      .msg.err {
        color: #a85a4f; /* deep blush — readable failure state */
      }
      .sub {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="msg" id="msg">מעבדים את התשלום…</div>
      <div class="sub" id="sub">רגע אחד</div>
    </div>
    <script>
      // This page is loaded inside the PeleCard payment iframe after the
      // transaction completes (PeleCard's GoodURL/ErrorURL). Tell the parent
      // collect.html page how it went so it can close the modal and refresh.
      (function () {
        var params = new URLSearchParams(location.search);
        var ok = !params.has('error');
        var msgEl = document.getElementById('msg');
        msgEl.className = 'msg ' + (ok ? 'ok' : 'err');
        msgEl.textContent = ok ? 'התשלום התקבל ✓' : 'התשלום לא הושלם';
        document.getElementById('sub').textContent = ok ? 'מעבירים אתכם בחזרה…' : 'אפשר לנסות שוב';
        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'dugri-pay', ok: ok }, location.origin);
          }
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </body>
</html>
