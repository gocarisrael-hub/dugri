    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
        font-size: 17px;
        -webkit-font-smoothing: antialiased;
        /* clear the fixed header (top) */
        padding-top: 60px;
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 22px;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--display);
        line-height: 1.2;
        font-weight: var(--h-weight);
        letter-spacing: var(--h-spacing);
      }
      a {
        color: inherit;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ---- shared button ---- */
      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        font-family: var(--display);
        font-weight: 600;
        font-size: 17.5px;
        letter-spacing: 0.02em;
        background: var(--sage);
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 16px 32px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        white-space: nowrap;
        box-shadow: var(--shadow-md);
        isolation: isolate;
        border: 1.5px solid #141414;
        touch-action: manipulation;
        transition:
          color 0.14s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.14s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
      }
      .btn::after {
        content: '';
        position: absolute;
        top: 0;
        inset-inline-start: -130%;
        width: 60%;
        height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        transform: skewX(-18deg);
        transition: inset-inline-start 0.55s ease;
      }
      @media (hover: hover) {
        .btn:hover::after {
          inset-inline-start: 130%;
        }
        .btn:hover {
          transform: translateY(-2px);
          box-shadow: var(--shadow-lg);
          filter: brightness(1.4);
        }
      }
      .btn:active {
        transform: translateY(0) scale(0.99);
        color: #141414;
      }
      /* press: directional white wipe (RTL sweeps in from the right, 300ms) */
      .btn::before {
        content: '';
        position: absolute;
        inset: 0;
        z-index: -1;
        background: #fff;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.14s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn:active::before {
        transform: scaleX(1);
      }
      @media (prefers-reduced-motion: reduce) {
        .btn,
        .btn::before {
          transition: none;
        }
      }
      .btn:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
      }
      a:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
        border-radius: var(--radius);
      }

      /* ====================================================================
         STORE GRID — the whole page. A clean grid of product photos, no card
         chrome (no border, background or shadow — "just the pictures"). Each
         card links to that design's detail page (product.html?design=<id>),
         which hosts the multi-photo gallery. Cards render client-side from
         js/designs.js (PUBLIC_DESIGNS) — single source of truth.
         ==================================================================== */
      .store {
        padding: 34px 0 54px;
      }
      /* Give the store the full content width on desktop so cards are large and
         the grid never shrinks into a tiny centered column. Phone stays ~2-up. */
      .store .wrap {
        max-width: 1240px;
      }
      .store-grid {
        display: grid;
        /* 2 columns on mobile; 3 on tablet; 4 on wide desktop. */
        grid-template-columns: repeat(2, 1fr);
        gap: 30px 20px;
      }
      @media (min-width: 600px) {
        .store-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 36px 28px;
        }
      }
      @media (min-width: 960px) {
        .store-grid {
          grid-template-columns: repeat(4, 1fr);
          gap: 44px 32px;
        }
      }

      /* a single product card = one link, no chrome */
      .product-card {
        display: block;
      }
      .product-card__link {
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
        border-radius: var(--radius);
        transition: transform 0.2s ease;
      }
      .product-card__link:hover {
        transform: translateY(-4px);
      }
      .product-card__link:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 4px;
        border-radius: var(--radius);
      }
      /* the product image — the only visual weight in the card. Sharp corners
         (no rounding that would clip the art), no border / background / shadow.
         object-fit:cover lets the landscape cover photo fill the frame cleanly
         (matching the home rail); the frame's aspect-ratio is close to the
         photo's (~1.5) so the crop is minimal. */
      .product-card__media {
        display: block;
        width: 100%;
        aspect-ratio: 841.92 / 595.5;
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
      }
      .product-card__media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* A tile that cycles pictures: the store image + the owner's carousel
         pictures become stacked frames the shared fade carousel cross-fades
         between (js/carousel.js, mode:'fade'). Each frame fills the media box
         exactly like the single image; the carousel engine positions them. */
      .product-card__media .tile-frame {
        display: block;
        width: 100%;
        height: 100%;
      }
      .product-name {
        display: block;
        text-align: center;
        font-family: var(--display);
        font-weight: 500;
        font-size: 15.5px;
        letter-spacing: 0.02em;
        color: var(--ink);
        margin-top: 12px;
      }
      .product-price {
        display: block;
        text-align: center;
        margin-top: 3px;
        font-weight: 600;
        font-size: 14.5px;
        color: var(--ink);
      }
      .product-price s {
        color: var(--muted);
        font-weight: 600;
        margin-inline-start: 6px;
      }

      /* graceful fallback if the catalog module can't load */
      .store-fallback {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 0;
      }
      .store-fallback .btn {
        margin-top: 14px;
      }

      /* ---- footer ---- */
      footer {
        padding: 30px 0;
        text-align: center;
        font-size: 14px;
        background: var(--ink);
        color: #e8ddd4;
      }
      footer a {
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      footer .tag {
        margin-top: 8px;
        font-size: 13px;
        color: #b9aca0;
      }
      .foot-icons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin-top: 18px;
      }
      .foot-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.16s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }
      .foot-icon:hover {
        transform: translateY(-2px);
        filter: brightness(1.06);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.34);
      }
      .foot-icon:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }
      .foot-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }
      .foot-icon.fi-wa {
        background: #25d366;
      }
      .foot-icon.fi-call {
        background: linear-gradient(140deg, #8ca287, #6f8a6a);
      }
      .foot-icon.fi-ig {
        background: radial-gradient(
          circle at 30% 107%,
          #fdf497 0%,
          #fdf497 5%,
          #fd5949 45%,
          #d6249f 60%,

      }
      .foot-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 22px;
        justify-content: center;
        margin-top: 14px;
        font-size: 14.5px;
      }
      .foot-contact a {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .foot-contact a:hover {
        text-decoration: underline;
      }
      .foot-contact .fc-label {
        color: #b9aca0;
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        * {
          transition-duration: 0.001ms !important;
        }
      }
    </style>

    <!-- Store grid: one clean product card per design, single source of truth =
         js/designs.js (PUBLIC_DESIGNS excludes private designs, hidden until
         unlocked with an access code in the order flow). Each card shows ONE
         image and links to the design's detail page (product.html?design=<id>),
         which hosts the multi-photo gallery. -->
    <script type="module">
      import { PUBLIC_DESIGNS as DESIGNS, fetchDesignNames } from './js/designs.js';
      import { fetchPricing, PRICING_FALLBACK } from './js/pricing.js';
      import { loadDesignImages, overrideFor, carouselFor } from './js/design-images.js';
      import { initCarousel } from './js/carousel.js';
      // Reuse the detail page's override helpers so the grid and PDP can never
      // diverge on how a saved (possibly blank) name override is resolved.
      // product.js only auto-boots when a #galleryTrack exists (PDP only), so
      // importing it here for the pure helpers has no side effects.
      import { overrideKeys, overrideText } from './js/product.js';

      // Owner-editable store price. The grid renders IMMEDIATELY with the launch
      // defaults (never blank / never blocked), then a timeout-bounded fetch
      // overlays the live price in a non-blocking .then() — a slow or cold endpoint
      // never delays the store.
      let PRICE = PRICING_FALLBACK.store.now;
      let WAS = PRICING_FALLBACK.store.was;
      const grid = document.getElementById('storeGrid');

      // Stamp a `.product-price` node: a struck WAS then "מ-PRICE ₪".
      function stampPrice(el) {
        el.textContent = '';
        const was = document.createElement('s');
        was.textContent = `${WAS} ₪`;
        el.appendChild(was);
        el.append(` מ-${PRICE} ₪`);
      }

      // ---- one product card ---------------------------------------------------
      function card(d) {
        const article = document.createElement('article');
        article.className = 'product-card';
        article.setAttribute('data-testid', 'product-card');
        article.setAttribute('data-design-id', d.id);

        // The whole card is a single link to the design's detail page.
        const link = document.createElement('a');
        link.className = 'product-card__link';
        link.href = `product.html?design=${encodeURIComponent(d.id)}`;
        link.setAttribute('data-testid', 'product-link');
        link.setAttribute('aria-label', d.name);

        // Product image (no border / background / shadow — "just the picture").
        // Real store cover photo: deck + game board on a table, per design.
        const media = document.createElement('span');
        media.className = 'product-card__media';
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = `assets/designs/${d.id}/store.webp`;
        img.alt = d.name;
        img.setAttribute('data-testid', 'product-image');
        img.setAttribute('data-store-default', img.src);
        media.appendChild(img);
        link.appendChild(media);

        // Hebrew design name.
        const name = document.createElement('span');
        name.className = 'product-name';
        name.textContent = d.name;
        link.appendChild(name);

        // Price: the struck WAS beside "מ-<now> ₪".
        const price = document.createElement('span');
        price.className = 'product-price';
        stampPrice(price);
        link.appendChild(price);

        article.appendChild(link);
        return article;
      }

      // How fast the tile carousel cross-fades between pictures. Short + snappy
      // ("fast", per the store's other carousels) — the fade transition itself is
      // ~0.8s (js/carousel.js FADE_MS), so this is the hold between fades.
      const TILE_CAROUSEL_INTERVAL = 2500;

      // Only auto-advance tiles that are actually on screen. Each tile carousel is
      // a forever setInterval + GPU opacity transitions; a grid of them running
      // off-screen is pure wasted CPU/battery. One shared IntersectionObserver
      // pauses a carousel when its tile scrolls out of view and resumes it when it
      // returns (via the shared engine's pause()/play()). Degrades gracefully: with
      // no IntersectionObserver the carousels just run as before.
      const tileVisibility =
        typeof IntersectionObserver === 'function'
          ? new IntersectionObserver(
              (entries) => {
                for (const e of entries) {
                  const api = e.target.__carousel;
                  if (!api) continue;
                  if (e.isIntersecting) api.play();
                  else api.pause();
                }
              },
              // A small margin so a tile resumes just before it scrolls into view.
              { rootMargin: '150px 0px' }
            )
          : null;

      // Turn a tile's single store image into a fast, seamless, auto-advancing
      // carousel of [store image, ...owner-added pictures]. Reuses the site's
      // shared fade carousel (the same engine the homepage hero uses): it stacks
      // the frames and cross-fades between them endlessly — no scroll, no clones,
      // so it can't break the grid cell. Under reduced motion it just rests on the
      // store image. `storeImg` is the existing (possibly store-overridden) tile
      // image; `paths` are the extra validated upload paths; `fallback` is the
      // shipped static store.webp a broken frame degrades to.
      function buildTileCarousel(media, storeImg, paths, fallback) {
        // Wrap the existing store image as the FIRST frame so it always shows and
        // never breaks, then add one frame per owner-added picture.
        const frame0 = document.createElement('span');
        frame0.className = 'tile-frame';
        media.insertBefore(frame0, storeImg);
        frame0.appendChild(storeImg);
        for (const p of paths) {
          const frame = document.createElement('span');
          frame.className = 'tile-frame';
          const im = document.createElement('img');
          im.loading = 'lazy';
          im.decoding = 'async';
          im.alt = storeImg.alt || '';
          im.setAttribute('data-testid', 'carousel-frame');
          // A broken/missing carousel picture degrades to the store image rather
          // than a broken frame (`once` guards against a loop on a bad fallback).
          im.addEventListener(
            'error',
            () => {
              if (fallback && im.src !== fallback) im.src = fallback;
            },
            { once: true }
          );
          im.src = p;
          frame.appendChild(im);
          media.appendChild(frame);
        }
        // Keep the tile's single tab stop on the card link — don't let the carousel
        // engine add a focusable track inside the anchor.
        if (!media.hasAttribute('tabindex')) media.setAttribute('tabindex', '-1');
        const api = initCarousel(media, {
          mode: 'fade',
          interval: TILE_CAROUSEL_INTERVAL,
          loop: true,
          dots: false,
        });
        // Pause immediately and let the observer resume it only while on screen
        // (the observer fires an initial callback for every observed target). With
        // no IntersectionObserver, leave it playing as the engine started it.
        if (tileVisibility) {
          api.pause();
          tileVisibility.observe(media);
        }
      }

      try {
        if (!Array.isArray(DESIGNS) || !DESIGNS.length) throw new Error('empty catalog');
        const frag = document.createDocumentFragment();
        for (const d of DESIGNS) {
          // Isolate each card so one bad design skips only itself, not the grid.
          try {
            frag.appendChild(card(d));
          } catch (cardErr) {
            console.error('skipping product card:', d && d.id, cardErr);
          }
        }
        if (!frag.childNodes.length) throw new Error('no cards rendered');
        grid.replaceChildren(frag);

        // Overlay the owner-editable name onto each card, using the SAME precedence
        // as the product detail page so a design's name is consistent across grid
        // and detail: an inline content-edit override (product-<id>-name, saved on
        // the product.html page) WINS over the admin template rename
        // (/api/design-names → themes.json display_he), which in turn wins over the
        // built-in catalog name. The grid already shows the built-in names, so this
        // only ever upgrades them; every fetch is fail-soft (grid stands on error).
        const contentNameOverride = (overrides, id) =>
          overrideText(overrides, overrideKeys(id).name);
        const loadContentNames = fetch('/api/content?page=product.html')
          .then((r) => (r.ok ? r.json() : { overrides: {} }))
          .then((data) => (data && data.overrides) || {})
          .catch(() => ({}));
        Promise.all([fetchDesignNames(), loadContentNames])
          .then(([names, contentOv]) => {
            for (const article of grid.querySelectorAll('[data-design-id]')) {
              const id = article.getAttribute('data-design-id');
              const content = contentNameOverride(contentOv, id);
              const eff = content != null ? content : names[id] != null ? names[id] : null;
              if (eff == null) continue; // no override — keep the built-in name
              const nameEl = article.querySelector('.product-name');
              if (nameEl) nameEl.textContent = eff;
              // Only push a NON-empty name into a11y attributes (a blanked override
              // mirrors the detail page's visible title but must not empty alt/label).
              if (eff) {
                const link = article.querySelector('.product-card__link');
                if (link) link.setAttribute('aria-label', eff);
                const img = article.querySelector('[data-testid="product-image"]');
                if (img) img.alt = eff;
              }
            }
          })
          .catch(() => {});

        // Overlay the owner's per-design STORE-tile overrides. First paint already
        // shows the static store.webp; this swaps in an uploaded picture where one
        // exists. Timeout-bounded + fail-safe (js/design-images.js): a slow/failed
        // fetch leaves every static default untouched.
        loadDesignImages()
          .then((map) => {
            for (const img of grid.querySelectorAll('[data-testid="product-image"]')) {
              const id = img.closest('[data-design-id]')?.getAttribute('data-design-id');
              const staticDefault = img.getAttribute('data-store-default');
              const override = overrideFor(map, id, 'store');
              if (override) {
                // If the override file is missing/broken, degrade to the shipped
                // static store.webp (captured in data-store-default). `once` guards
                // against a loop if the static asset itself somehow fails.
                img.addEventListener(
                  'error',
                  () => {
                    if (staticDefault && img.src !== staticDefault) img.src = staticDefault;
                  },
                  { once: true }
                );
                img.src = override;
              }
              // If the owner added carousel pictures, turn the tile into a fast
              // seamless carousel of [store image, ...added pictures]. The store
              // frame (above) is always frame 0, so the tile never breaks and a
              // design with no carousel pictures stays a single static image.
              const extra = carouselFor(map, id);
              const media = img.closest('.product-card__media');
              if (extra.length && media && !media.__carousel) {
                try {
                  buildTileCarousel(media, img, extra, staticDefault);
                } catch (carErr) {
                  console.error('tile carousel skipped:', id, carErr);
                }
              }
            }
          })
          .catch(() => {
            /* fail-safe: static store.webp stays */
          });
      } catch (err) {
        // Graceful degradation: never leave a blank page — offer the wizard.
        grid.innerHTML =
          '<div class="store-fallback"><p>לא הצלחנו לטעון את גלריית העיצובים כרגע.</p>' +
          '<a class="btn" href="options.html">להזמנה ובחירת עיצוב ›</a></div>';
        console.error('store grid failed to render:', err);
      }

      // Overlay the live owner-editable price once it resolves (non-blocking;
      // fail-safe — on a slow/failed fetch the seeded launch defaults stay).
      fetchPricing().then((p) => {
        PRICE = p.store.now;
        WAS = p.store.was;
        for (const el of document.querySelectorAll('.product-price')) stampPrice(el);
      });
    </script>
  </body>
</html>
