    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
        font-size: 17px;
        -webkit-font-smoothing: antialiased;
        /* clear the fixed header (top) */
        padding-top: 60px;
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 22px;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--display);
        line-height: 1.2;
        font-weight: var(--h-weight);
        letter-spacing: var(--h-spacing);
      }
      a {
        color: inherit;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ---- shared button ---- */
      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        font-family: var(--display);
        font-weight: 600;
        font-size: 17.5px;
        letter-spacing: 0.02em;
        background: var(--sage);
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 16px 32px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        white-space: nowrap;
        box-shadow: var(--shadow-md);
        isolation: isolate;
        border: 1.5px solid #141414;
        touch-action: manipulation;
        transition:
          color 0.14s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.14s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
      }
      .btn::after {
        content: '';
        position: absolute;
        top: 0;
        inset-inline-start: -130%;
        width: 60%;
        height: 100%;
        background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        transform: skewX(-18deg);
        transition: inset-inline-start 0.55s ease;
      }
      @media (hover: hover) {
        .btn:hover::after {
          inset-inline-start: 130%;
        }
        .btn:hover {
          transform: translateY(-2px);
          box-shadow: var(--shadow-lg);
          filter: brightness(1.4);
        }
      }
      .btn:active {
        transform: translateY(0) scale(0.99);
        color: #141414;
      }
      /* press: directional white wipe (RTL sweeps in from the right, 300ms) */
      .btn::before {
        content: '';
        position: absolute;
        inset: 0;
        z-index: -1;
        background: #fff;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.14s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn:active::before {
        transform: scaleX(1);
      }
      @media (prefers-reduced-motion: reduce) {
        .btn,
        .btn::before {
          transition: none;
        }
      }
      .btn:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
      }
      a:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
        border-radius: var(--radius);
      }

      /* ====================================================================
         STORE GRID — the whole page. A clean grid of product photos, no card
         chrome (no border, background or shadow — "just the pictures"). Each
         card links to that design's detail page (product.html?design=<id>),
         which hosts the multi-photo gallery. Cards render client-side from
         js/designs.js (PUBLIC_DESIGNS) — single source of truth.
         ==================================================================== */
      .store {
        padding: 34px 0 54px;
      }
      /* Give the store the full content width on desktop so cards are large and
         the grid never shrinks into a tiny centered column. Phone stays ~2-up. */
      .store .wrap {
        max-width: 1240px;
      }
      .store-grid {
        display: grid;
        /* 2 columns on mobile; 3 on tablet; 4 on wide desktop. */
        grid-template-columns: repeat(2, 1fr);
        gap: 30px 20px;
      }
      @media (min-width: 600px) {
        .store-grid {
          grid-template-columns: repeat(3, 1fr);
          gap: 36px 28px;
        }
      }
      @media (min-width: 960px) {
        .store-grid {
          grid-template-columns: repeat(4, 1fr);
          gap: 44px 32px;
        }
      }

      /* a single product card = a swipeable picture carousel + a caption link */
      .product-card {
        display: block;
      }
      /* the picture box. object-fit:contain shows the WHOLE picture, never cropped;
         any letterbox falls back to the tile's --surface background. */
      .product-card__media {
        position: relative;
        display: block;
        width: 100%;
        aspect-ratio: 841.92 / 595.5;
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--surface);
        transition: transform 0.2s ease;
      }
      .product-card:hover .product-card__media {
        transform: translateY(-4px);
      }
      /* the per-card image carousel: one picture per view, native swipe (the
         shared carousel engine owns the mechanics via .carousel-track). Slides are
         flush (no gap) so each snaps cleanly full-frame. */
      .product-card__track {
        height: 100%;
        --carousel-gap: 0;
      }
      .product-card__slide {
        flex: 0 0 100%;
        display: block;
        height: 100%;
        text-decoration: none;
      }
      .product-card__media img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        -webkit-user-drag: none;
        user-select: none;
      }
      /* dots strip: a SIBLING below the media (never inside a slide link, never
         over the overflow:hidden picture). Hidden for single-picture cards. Dot
         appearance comes from css/carousel.css; this only positions the strip. */
      .product-card__dots {
        display: flex;
        justify-content: center;
        margin-top: 8px;
      }
      .product-card__dots:empty {
        display: none;
      }
      .product-card__dots .carousel-dots {
        flex-wrap: wrap;
        padding: 0;
        max-width: 100%;
      }
      .product-card__caption {
        display: block;
        text-decoration: none;
        color: inherit;
      }
      .product-card__caption:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 4px;
        border-radius: var(--radius);
      }
      .product-name {
        display: block;
        text-align: center;
        font-family: var(--display);
        font-weight: 500;
        font-size: 15.5px;
        letter-spacing: 0.02em;
        color: var(--ink);
        margin-top: 12px;
      }
      .product-price {
        /* Flex row (RTL) so the current price is first (right) and the struck
           was-price second (left) — deterministic, unlike bidi-reordered inline
           number runs. */
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: 6px;
        margin-top: 3px;
        font-weight: 600;
        font-size: 14.5px;
        color: var(--ink);
      }
      .product-price s {
        color: var(--muted);
        font-weight: 600;
      }

      /* graceful fallback if the catalog module can't load */
      .store-fallback {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 0;
      }
      .store-fallback .btn {
        margin-top: 14px;
      }

      /* ---- footer ---- */
      footer {
        padding: 30px 0;
        text-align: center;
        font-size: 14px;
        background: var(--ink);
        color: #e8ddd4;
      }
      footer a {
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      footer .tag {
        margin-top: 8px;
        font-size: 13px;
        color: #b9aca0;
      }
      .foot-icons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin-top: 18px;
      }
      .foot-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.16s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }
      .foot-icon:hover {
        transform: translateY(-2px);
        filter: brightness(1.06);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.34);
      }
      .foot-icon:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }
      .foot-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }
      .foot-icon.fi-wa {
        background: #25d366;
      }
      .foot-icon.fi-call {
        background: linear-gradient(140deg, #8ca287, #6f8a6a);
      }
      .foot-icon.fi-ig {
        background: radial-gradient(
          circle at 30% 107%,
          #fdf497 0%,
          #fdf497 5%,
          #fd5949 45%,
          #d6249f 60%,
          #285aeb 90%
        );
      }
      .foot-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 22px;
        justify-content: center;
        margin-top: 14px;
        font-size: 14.5px;
      }
      .foot-contact a {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .foot-contact a:hover {
        text-decoration: underline;
      }
      .foot-contact .fc-label {
        color: #b9aca0;
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        * {
          transition-duration: 0.001ms !important;
        }
      }
    </style>

    <!-- Store grid: one clean product card per design, single source of truth =
         js/designs.js (PUBLIC_DESIGNS excludes private designs, hidden until
         unlocked with an access code in the order flow). Each card shows ONE
         image and links to the design's detail page (product.html?design=<id>),
         which hosts the multi-photo gallery. -->
    <script type="module">
      import { initCarousel } from './js/carousel.js';
      import { PUBLIC_DESIGNS as DESIGNS, fetchDesignNames } from './js/designs.js';
      import { fetchPricing, PRICING_FALLBACK } from './js/pricing.js';
      import { loadDesignImages, galleryFor } from './js/design-images.js';
      // Reuse the detail page's override helpers so the grid and PDP can never
      // diverge on how a saved (possibly blank) name override is resolved. product.js
      // only auto-boots when a #galleryTrack exists (PDP only), so importing it here
      // for the pure helpers has no side effects.
      import { overrideKeys, overrideText } from './js/product.js';

      // Owner-editable store price. The grid renders IMMEDIATELY with the launch
      // defaults (never blank / never blocked), then a timeout-bounded fetch overlays
      // the live price in a non-blocking .then().
      let PRICE = PRICING_FALLBACK.store.now;
      let WAS = PRICING_FALLBACK.store.was;
      const grid = document.getElementById('storeGrid');

      // Storefront names by precedence: the owner's inline content-edit name
      // (product-<id>-name) WINS over the admin template rename (/api/design-names →
      // themes.json display_he), which wins over the built-in catalog name. Both maps
      // fill in async (fail-safe {} on error) — the grid ships with built-in names.
      let designNames = {}; // admin design-names
      let nameOverrides = {}; // inline content-edit names (non-empty)
      function resolvedName(d) {
        return nameOverrides[d.id] || designNames[d.id] || d.name;
      }

      // Stamp a `.product-price` flex row: a `.now` current price first, then a
      // struck WAS. In this RTL row `.now` lands on the right and the struck WAS left.
      function stampPrice(el) {
        el.textContent = '';
        const now = document.createElement('span');
        now.className = 'now';
        now.textContent = `מ-${PRICE} ₪`;
        el.appendChild(now);
        const was = document.createElement('s');
        was.textContent = `${WAS} ₪`;
        el.appendChild(was);
      }

      // A broken override degrades to its shipped fallback (once); a picture with no
      // shipped fallback (droppable) is left as-is on the grid (rare — a missing
      // upload) rather than desyncing the fixed dot count.
      function onImgError(e) {
        const img = e.currentTarget;
        const fb = img.dataset.fallback;
        if (fb && img.getAttribute('src') !== fb) img.src = fb;
      }

      // ---- one product card ---------------------------------------------------
      // `map` is the resolved gallery-config map ({} before it loads / on failure).
      function card(d, map) {
        const article = document.createElement('article');
        article.className = 'product-card';
        article.setAttribute('data-testid', 'product-card');
        article.setAttribute('data-design-id', d.id);

        const detail = `product.html?design=${encodeURIComponent(d.id)}`;
        const dName = resolvedName(d);

        // The picture area: a swipeable carousel of the design's products-surface
        // gallery. Each slide links to the detail page — a TAP opens the product, a
        // horizontal DRAG swipes the pictures (the browser owns the gesture).
        const media = document.createElement('div');
        media.className = 'product-card__media';
        const track = document.createElement('div');
        track.className = 'product-card__track';
        const shots = galleryFor(map, d, 'products');
        shots.forEach((shot, i) => {
          const slide = document.createElement('a');
          slide.className = 'product-card__slide';
          slide.href = detail;
          slide.setAttribute('aria-label', dName);
          slide.dataset.label = shot.name || `${dName} — ${i + 1}`;
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.decoding = 'async';
          img.draggable = false;
          img.src = shot.src;
          img.alt = shot.name || dName;
          img.dataset.fallback = shot.fallback || '';
          // The FIRST slide keeps the product-image test hook + the store fallback.
          if (i === 0) {
            img.setAttribute('data-testid', 'product-image');
            img.setAttribute('data-store-default', shot.fallback || shot.src);
          }
          img.addEventListener('error', onImgError);
          slide.appendChild(img);
          track.appendChild(slide);
        });
        media.appendChild(track);
        article.appendChild(media);

        // Dots (rendered by the carousel engine) sit just under the picture.
        const dots = document.createElement('div');
        dots.className = 'product-card__dots';
        article.appendChild(dots);

        // Caption: Hebrew name + price, linking to the detail page.
        const cap = document.createElement('a');
        cap.className = 'product-card__caption';
        cap.href = detail;
        cap.setAttribute('data-testid', 'product-link');
        cap.setAttribute('aria-label', dName);
        const name = document.createElement('span');
        name.className = 'product-name';
        name.textContent = dName;
        const price = document.createElement('span');
        price.className = 'product-price';
        stampPrice(price);
        cap.append(name, price);
        article.appendChild(cap);

        // Wire the swipe carousel only when there's more than one picture — the same
        // one-per-view snap swipe + dots as the product-detail gallery. loop:false
        // (no clones) keeps the card DOM lean across the whole grid. autoplay:false —
        // the pictures change ONLY when the shopper swipes / taps a dot, never on a
        // timer (a store tile quietly cycling on its own is distracting).
        if (shots.length > 1) {
          initCarousel(track, {
            mode: 'slideshow',
            autoplay: false,
            loop: false,
            dots: true,
            dotsInto: dots,
          });
        }
        return article;
      }

      function renderGrid(map) {
        try {
          if (!Array.isArray(DESIGNS) || !DESIGNS.length) throw new Error('empty catalog');
          const frag = document.createDocumentFragment();
          for (const d of DESIGNS) {
            // Isolate each card so one bad design skips only itself, not the grid.
            try {
              frag.appendChild(card(d, map));
            } catch (cardErr) {
              console.error('skipping product card:', d && d.id, cardErr);
            }
          }
          if (!frag.childNodes.length) throw new Error('no cards rendered');
          grid.replaceChildren(frag);
        } catch (err) {
          // Graceful degradation: never leave a blank page — offer the wizard.
          grid.innerHTML =
            '<div class="store-fallback"><p>לא הצלחנו לטעון את גלריית העיצובים כרגע.</p>' +
            '<a class="btn" href="options.html">להזמנה ובחירת עיצוב ›</a></div>';
          console.error('store grid failed to render:', err);
        }
      }

      // Re-apply the resolved name to each already-rendered card in place (visible
      // name + the caption link's aria-label + each slide's aria-label) — no rebuild,
      // so the carousels are untouched.
      function applyNames() {
        for (const d of DESIGNS) {
          const cardEl = grid.querySelector(`.product-card[data-design-id="${d.id}"]`);
          if (!cardEl) continue;
          const nm = resolvedName(d);
          const nameEl = cardEl.querySelector('.product-name');
          if (nameEl) nameEl.textContent = nm;
          // Only push a NON-empty name into a11y attributes (a blanked override must
          // not empty the link label / slide labels).
          if (nm) {
            const cap = cardEl.querySelector('.product-card__caption');
            if (cap) cap.setAttribute('aria-label', nm);
            cardEl
              .querySelectorAll('.product-card__slide')
              .forEach((slide) => slide.setAttribute('aria-label', nm));
          }
        }
      }

      // The owner's inline content-edit names live on the product.html content page
      // (product-<id>-name). Fetch that page's overrides so a name edited on a detail
      // page also renames the grid card. Fail-safe: {} on any error.
      const loadContentNames = fetch('/api/content?page=product.html')
        .then((r) => (r.ok ? r.json() : { overrides: {} }))
        .then((data) => (data && data.overrides) || {})
        .catch(() => ({}));

      // First paint from the shipped renders + built-in names — never blocks on the
      // network, so the grid always renders.
      renderGrid({});

      // Overlay the owner-editable names (content override > admin name), fail-soft.
      Promise.all([fetchDesignNames(), loadContentNames])
        .then(([names, contentOv]) => {
          designNames = names || {};
          const ov = {};
          for (const d of DESIGNS) {
            const c = overrideText(contentOv, overrideKeys(d.id).name);
            if (c != null && String(c).trim() !== '') ov[d.id] = c;
          }
          nameOverrides = ov;
          if (Object.keys(designNames).length || Object.keys(nameOverrides).length) applyNames();
        })
        .catch(() => {});

      // Reconcile with the owner's curated gallery (design-images) as it loads: a
      // rebuild swaps in per-slot overrides + extra pictures + ordering. Fail-safe
      // (js/design-images.js): a slow/failed fetch leaves the shipped renders.
      loadDesignImages()
        .then((map) => {
          if (map && Object.keys(map).length) {
            renderGrid(map);
            applyNames(); // re-apply names onto the rebuilt cards
          }
        })
        .catch(() => {});

      // Overlay the live owner-editable price once it resolves (non-blocking;
      // fail-safe — on a slow/failed fetch the seeded launch defaults stay).
      fetchPricing().then((p) => {
        PRICE = p.store.now;
        WAS = p.store.was;
        for (const el of document.querySelectorAll('.product-price')) stampPrice(el);
      });
    </script>
  </body>
</html>
