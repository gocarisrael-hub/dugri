<html lang="he" dir="rtl">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

      content="גלריית העיצובים של דוגרי - כל תבנית זמינה במגוון צבעים. בוחרים עיצוב וממשיכים להזמנה."
    />

    <link rel="preload" as="image" href="assets/logo.png" />

      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Carlito:wght@400;700&family=Heebo:wght@500;700;800;900&display=swap"

      onload="this.media = 'all'"

    <noscript>

    <style>
      :root {
        --bg: #fff5f8; /* very light pink */
        --surface: #ffffff;
        --blush: #fbe8ee;
        --blush-deep: #f1d2dc;
        --ink: #2c1a29;
        --muted: #7c6a74;
        --wine: #9b2d54;
        --wine-deep: #7a1f40;
        --gold: #bc9a4c;
        --hot: #e5197d; /* vivid pink, matches the logo */
        --hot-deep: #c7106a;
        --line: #f0dee4;
        --font: 'Calibri', 'Carlito', 'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif;
        --display: 'Heebo', 'Calibri', 'Carlito', 'Segoe UI', 'Arial', sans-serif;
        --shadow-sm: 0 2px 8px rgba(44, 26, 41, 0.06), 0 1px 2px rgba(44, 26, 41, 0.04);
        --shadow-md: 0 10px 28px rgba(44, 26, 41, 0.1), 0 3px 8px rgba(44, 26, 41, 0.06);
        --shadow-lg: 0 26px 60px rgba(44, 26, 41, 0.16), 0 8px 18px rgba(44, 26, 41, 0.08);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
        font-size: 17px;
        -webkit-font-smoothing: antialiased;
        /* clear the fixed nav */
        padding-top: 58px;
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 22px;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--display);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.015em;
      }
      a {
        color: inherit;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ---- shared button ---- */
      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 17.5px;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 16px 32px;
        border-radius: 999px;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(229, 25, 125, 0.3);
        transition:
          transform 0.14s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
      }
      .btn:focus-visible {
        outline: 3px solid var(--hot);
        outline-offset: 3px;
      }
      a:focus-visible {
        outline: 3px solid var(--hot);
        outline-offset: 3px;
        border-radius: 8px;
      }

      /* ---- shared nav (copied from index.html) ---- */
      .nav {
        position: fixed;
        top: 0;
        inset-inline: 0;
        z-index: 80;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 6px 20px rgba(44, 26, 41, 0.07);
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .nav-logo {
        display: flex;
        align-items: center;
      }
      .nav-logo img {
        height: 34px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-inline-start: auto;
      }
      .nav-links a {
        font-family: var(--display);
        font-weight: 800;
        font-size: 15.5px;
        color: var(--wine);
        padding: 8px 12px;
        border-radius: 10px;
        text-decoration: none;
        transition:
          background 0.18s ease,
          color 0.18s ease;
      }
      .nav-links a:hover {
        background: var(--blush);
        color: var(--wine-deep);
      }
      .nav-links a.nav-cta {
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        padding: 9px 20px;
        box-shadow: 0 6px 16px rgba(229, 25, 125, 0.26);
      }
      .nav-links a.nav-cta:hover {
        filter: brightness(1.05);
        color: #fff;
      }
      .nav-toggle {
        display: none;
        margin-inline-start: auto;
        background: none;
        border: 1px solid var(--blush-deep);
        border-radius: 10px;
        width: 42px;
        height: 40px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      .nav-toggle span,
      .nav-toggle span::before,
      .nav-toggle span::after {
        display: block;
        width: 20px;
        height: 2px;
        background: var(--wine);
        position: relative;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }
      .nav-toggle span::before {
        content: '';
        position: absolute;
        top: -6px;
      }
      .nav-toggle span::after {
        content: '';
        position: absolute;
        top: 6px;
      }
      @media (max-width: 640px) {
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 100%;
          inset-inline: 0;
          flex-direction: column;
          align-items: stretch;
          gap: 0;
          background: rgba(255, 255, 255, 0.98);
          border-bottom: 1px solid var(--line);
          box-shadow: 0 14px 28px rgba(44, 26, 41, 0.12);
          padding: 8px 14px 14px;
          margin: 0;
          display: none;
        }
        .nav-links.open {
          display: flex;
        }
        .nav-links a {
          padding: 13px 10px;
          border-radius: 10px;
        }
        .nav-links a.nav-cta {
          margin-top: 6px;
          text-align: center;
          justify-content: center;
        }
      }

      /* ---- page intro ---- */
      .products {
        padding: 40px 0 56px;
      }
      .sec-title {
        text-align: center;
        margin-bottom: 30px;
      }
      .sec-title h2 {
        font-size: 34px;
        font-weight: 800;
      }
      .sec-title p {
        color: var(--muted);
        margin-top: 6px;
        font-size: 16px;
      }

      /* ---- tile grid ---- */
      .tile-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 560px) {
        .tile-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 820px) {
        .tile-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      /* ---- one tile (link wrapping the whole card) ---- */
      .tile {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1.5px solid var(--blush-deep);
        border-radius: 20px;
        padding: 14px 14px 16px;
        box-shadow: var(--shadow-sm);
        text-decoration: none;
        color: inherit;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease;
      }
      .tile:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: var(--hot);
      }
      .tile:focus-visible {
        outline: 3px solid var(--hot);
        outline-offset: 3px;
      }
      .tile .thumb {
        aspect-ratio: 841.92 / 595.5;
        width: 100%;
        border-radius: 14px;
        background: var(--blush);
        border: 1px solid var(--blush-deep);
        overflow: hidden;
      }
      .tile .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .tile .tname {
        font-family: var(--display);
        font-weight: 800;
        font-size: 20px;
        color: var(--wine-deep);
        margin-top: 12px;
      }
      .tile .dots {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .tile .dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1.5px solid rgba(44, 26, 41, 0.12);
        flex: 0 0 auto;
      }
      .tile .dots-more {
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }
      .tile .price {
        margin-top: 10px;
        font-weight: 700;
        color: var(--ink);
        font-size: 15.5px;
      }
      .tile .price s {
        color: var(--muted);
        font-weight: 600;
        margin-inline-end: 4px;
      }
      /* button-styled affordance inside the link */
      .tile .tile-cta {
        margin-top: 14px;
        align-self: stretch;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, var(--hot), var(--wine));
        color: #fff;
        padding: 12px 22px;
        border-radius: 999px;
        box-shadow: 0 8px 18px rgba(229, 25, 125, 0.26);
        transition: filter 0.2s ease;
      }
      .tile:hover .tile-cta {
        filter: brightness(1.05);
      }

      /* graceful fallback if the catalog module can't load */
      .tile-fallback {
        text-align: center;
        padding: 30px 0;
      }
      .tile-fallback .btn {
        margin-top: 14px;
      }

      /* ---- footer (copied from index.html) ---- */
      footer {
        padding: 30px 0;
        text-align: center;
        font-size: 14px;
        background: var(--ink);
        color: #e8d7de;
      }
      footer a {
        color: #fff;
        font-weight: 700;
        text-decoration: none;

      .foot-icons {

        gap: 16px;
        margin-top: 18px;
      }
      .foot-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
        transition:

          box-shadow 0.2s ease,
          filter 0.2s ease;
      }
      .foot-icon:hover {
        transform: translateY(-2px);
        filter: brightness(1.06);

      .foot-icon:focus-visible {

        outline-offset: 3px;

      .foot-icon svg {

      .foot-icon.fi-wa {

      .foot-icon.fi-call {

      .foot-icon.fi-ig {

          #fd5949 45%,
          #d6249f 60%,

        );
      }
      .foot-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 22px;
        justify-content: center;
        margin-top: 14px;
        font-size: 14.5px;
      }
      .foot-contact a {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .foot-contact a:hover {
        text-decoration: underline;
      }
      .foot-contact .fc-label {
        color: #c7a9b5;
        font-weight: 600;
      }
    </style>
  </head>

    <!-- Shared nav: mobile toggle menu (progressive enhancement). -->
    <script>
      (function () {
        var navToggle = document.querySelector('.nav-toggle');
        var navLinks = document.getElementById('navLinks');
        if (navToggle && navLinks) {
          navToggle.addEventListener('click', function () {
            var open = navLinks.classList.toggle('open');
            navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          });
          navLinks.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('click', function () {
              navLinks.classList.remove('open');
              navToggle.setAttribute('aria-expanded', 'false');
            });
          });
        }
      })();
    </script>

    <!-- Templates gallery: one tile per design, single source of truth = js/designs.js.
         Each tile deep-links into the wizard already on the colour step
         (options.html?design=<id>&step=2). -->
    <script type="module">
      import { DESIGNS, MAIN_COLORS } from './js/designs.js';

      const PRICE = 79;
      const grid = document.getElementById('tileGrid');

      function tile(d) {
        const a = document.createElement('a');
        a.className = 'tile';
        // Fixed-colour designs (neon) have nothing to pick on the colour step, so
        // skip it and deep-link to the add-ons step instead. Sliders start on colour.
        const step = d.recolor === 'fixed' ? 3 : 2;
        a.href = `options.html?design=${encodeURIComponent(d.id)}&step=${step}`;
        a.setAttribute('data-testid', 'tile');
        a.setAttribute('data-design-id', d.id);
        a.setAttribute('aria-label', `בחרו עיצוב ${d.name}`);

        // thumbnail (landscape page frame, lazy)
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        if (d.thumb) {
          const img = document.createElement('img');
          img.loading = 'lazy';
          img.src = d.thumb;
          img.alt = d.name;
          thumb.appendChild(img);
        }
        a.appendChild(thumb);

        // name
        const name = document.createElement('div');
        name.className = 'tname';
        name.textContent = d.name;
        a.appendChild(name);

        // colour note
        const dots = document.createElement('div');
        dots.className = 'dots';
        if (d.recolor === 'fixed') {
          dots.setAttribute('aria-label', 'צבע קבוע');
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.setAttribute('aria-hidden', 'true');
          if (d.accent) dot.style.background = d.accent;
          dots.appendChild(dot);
          const more = document.createElement('span');
          more.className = 'dots-more';
          more.setAttribute('aria-hidden', 'true');
          more.textContent = 'צבע קבוע';
          dots.appendChild(more);
        } else {
          dots.setAttribute('aria-label', `זמין ב-${MAIN_COLORS.length} צבעים`);
          for (const c of MAIN_COLORS) {
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.setAttribute('aria-hidden', 'true');
            dot.style.background = c.hex;
            dot.title = c.name;
            dots.appendChild(dot);
          }
          const more = document.createElement('span');
          more.className = 'dots-more';
          more.setAttribute('aria-hidden', 'true');
          more.textContent = 'ועוד';
          dots.appendChild(more);
        }
        a.appendChild(dots);

        // price
        const price = document.createElement('div');
        price.className = 'price';
        price.textContent = `החל מ-${PRICE} ₪`;
        a.appendChild(price);

        // button-styled affordance (whole tile is the link)
        const cta = document.createElement('span');
        cta.className = 'tile-cta';
        cta.setAttribute('aria-hidden', 'true');
        cta.textContent = 'בחרו עיצוב ›';
        a.appendChild(cta);

        return a;
      }

      try {
        if (!Array.isArray(DESIGNS) || !DESIGNS.length) throw new Error('empty catalog');
        const frag = document.createDocumentFragment();
        for (const d of DESIGNS) frag.appendChild(tile(d));
        grid.replaceChildren(frag);
      } catch (err) {
        // Graceful degradation: never leave a blank page — offer the wizard directly.
        grid.classList.add('tile-fallback');
        grid.innerHTML =
          '<div class="tile-fallback"><p>לא הצלחנו לטעון את גלריית העיצובים כרגע.</p>' +
          '<a class="btn" href="options.html">להזמנה ובחירת עיצוב ›</a></div>';
        console.error('products gallery failed to render:', err);
      }
    </script>
  </body>
</html>
