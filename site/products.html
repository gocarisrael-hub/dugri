<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>דוגרי · בחרו את העיצוב</title>
    <meta
      name="description"
      content="גלריית העיצובים של דוגרי - כל תבנית זמינה במגוון צבעים. בוחרים עיצוב וממשיכים להזמנה."
    />

    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preload" as="image" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&family=Heebo:wght@600;700;800;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&family=Heebo:wght@600;700;800;900&display=swap"
      />
    </noscript>
    <link rel="stylesheet" href="/css/tokens.css" />
    <style>
      :root {
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
        font-size: 17px;
        -webkit-font-smoothing: antialiased;
        /* clear the fixed nav */
        padding-top: 58px;
      }
      .wrap {
        max-width: 1000px;
        margin: 0 auto;
        padding: 0 22px;
      }
      h1,
      h2,
      h3,
      h4 {
        font-family: var(--display);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.015em;
      }
      a {
        color: inherit;
      }
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      /* ---- shared button ---- */
      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 17.5px;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, var(--sage), var(--sage-deep));
        color: #fff;
        border: none;
        cursor: pointer;
        padding: 16px 32px;
        border-radius: 999px;
        text-decoration: none;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(229, 25, 125, 0.3);
        transition:
          transform 0.14s ease,
          box-shadow 0.25s ease,
          filter 0.2s ease;
      }
      .btn:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
      }
      a:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
        border-radius: 8px;
      }

      /* ---- shared nav (copied from index.html) ---- */
      .nav {
        position: fixed;
        top: 0;
        inset-inline: 0;
        z-index: 80;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 6px 20px rgba(35, 32, 28, 0.07);
      }
      .nav-inner {
        max-width: 1000px;
        margin: 0 auto;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .nav-logo {
        display: flex;
        align-items: center;
      }
      .nav-logo img {
        height: 34px;
        width: auto;
        display: block;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-inline-start: auto;
      }
      .nav-links a {
        font-family: var(--display);
        font-weight: 800;
        font-size: 15.5px;
        color: var(--sage-deep);
        padding: 8px 12px;
        border-radius: 10px;
        text-decoration: none;
        transition:
          background 0.18s ease,
          color 0.18s ease;
      }
      .nav-links a:hover {
        background: var(--section);
        color: var(--sage-deeper);
      }
      .nav-links a.nav-cta {
        background: linear-gradient(135deg, var(--sage), var(--sage-deep));
        color: #fff;
        padding: 9px 20px;
        box-shadow: 0 6px 16px rgba(229, 25, 125, 0.26);
      }
      .nav-links a.nav-cta:hover {
        filter: brightness(1.05);
        color: #fff;
      }
      .nav-toggle {
        display: none;
        margin-inline-start: auto;
        background: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        width: 42px;
        height: 40px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      .nav-toggle span,
      .nav-toggle span::before,
      .nav-toggle span::after {
        display: block;
        width: 20px;
        height: 2px;
        background: var(--sage-deep);
        position: relative;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }
      .nav-toggle span::before {
        content: '';
        position: absolute;
        top: -6px;
      }
      .nav-toggle span::after {
        content: '';
        position: absolute;
        top: 6px;
      }
      @media (max-width: 640px) {
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          position: absolute;
          top: 100%;
          inset-inline: 0;
          flex-direction: column;
          align-items: stretch;
          gap: 0;
          background: rgba(255, 255, 255, 0.98);
          border-bottom: 1px solid var(--line);
          box-shadow: 0 14px 28px rgba(35, 32, 28, 0.12);
          padding: 8px 14px 14px;
          margin: 0;
          display: none;
        }
        .nav-links.open {
          display: flex;
        }
        .nav-links a {
          padding: 13px 10px;
          border-radius: 10px;
        }
        .nav-links a.nav-cta {
          margin-top: 6px;
          text-align: center;
          justify-content: center;
        }
      }

      /* ---- page intro ---- */
      .products {
        padding: 40px 0 56px;
      }
      .sec-title {
        text-align: center;
        margin-bottom: 30px;
      }
      .sec-title h2 {
        font-size: 34px;
        font-weight: 800;
      }
      .sec-title p {
        color: var(--muted);
        margin-top: 6px;
        font-size: 16px;
      }

      /* ---- tile grid: 2-up primary (big, prominent cards). 1-up only on very
             narrow phones. ---- */
      .tile-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      @media (max-width: 379px) {
        .tile-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ---- one tile (a card; NOT a single link, so the carousel arrows and the
             enlarge button are their own controls and don't trigger navigation) ---- */
      .tile {
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1.5px solid var(--line);
        border-radius: 22px;
        padding: 16px 16px 18px;
        box-shadow: var(--shadow-sm);
        color: inherit;
        transition:
          transform 0.22s ease,
          box-shadow 0.22s ease,
          border-color 0.22s ease;
      }
      .tile:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-md);
        border-color: var(--sage);
      }

      /* image carousel (front → back → board) */
      .carousel {
        position: relative;
      }
      .tile .thumb {
        aspect-ratio: 841.92 / 595.5;
        width: 100%;
        border-radius: 14px;
        background: var(--section);
        border: 1px solid var(--line);
        overflow: hidden;
        cursor: zoom-in;
      }
      .tile .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* carousel arrows — RTL aware: "previous" sits on the right, "next" on the
         left (matching the reading direction). */
      .car-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 2;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.9);
        color: var(--sage-deeper);
        font-family: var(--display);
        font-size: 24px;
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(35, 32, 28, 0.2);
        transition:
          background 0.16s ease,
          transform 0.16s ease;
      }
      .car-arrow:hover {
        background: #fff;
        transform: translateY(-50%) scale(1.08);
      }
      .car-arrow:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 2px;
      }
      .car-arrow.prev {
        inset-inline-end: 8px;
      }
      .car-arrow.next {
        inset-inline-start: 8px;
      }
      /* enlarge (fullscreen) affordance */
      .enlarge {
        position: absolute;
        top: 8px;
        inset-inline-end: 8px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: none;
        background: rgba(35, 32, 28, 0.55);
        color: #fff;
        font-size: 19px;
        line-height: 1;
        cursor: zoom-in;
        box-shadow: 0 4px 12px rgba(35, 32, 28, 0.24);
        transition: background 0.16s ease;
      }
      .enlarge:hover {
        background: rgba(35, 32, 28, 0.78);
      }
      .enlarge:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 2px;
      }
      /* per-product indicator dots */
      .car-dots {
        position: absolute;
        inset-block-end: 8px;
        inset-inline: 0;
        display: flex;
        justify-content: center;
        gap: 6px;
        z-index: 2;
      }
      .car-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: none;
        padding: 0;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 1px 3px rgba(35, 32, 28, 0.3);
        transition:
          background 0.16s ease,
          transform 0.16s ease;
      }
      .car-dot.is-active {
        background: var(--sage);
        transform: scale(1.25);
      }
      .car-dot:focus-visible {
        outline: 2px solid var(--sage);
        outline-offset: 2px;
      }

      .tile .tname {
        display: inline-block;
        font-family: var(--display);
        font-weight: 800;
        font-size: 22px;
        color: var(--sage-deeper);
        margin-top: 14px;
        text-decoration: none;
      }
      a.tname:hover {
        text-decoration: underline;
      }
      .tile .dots {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      .tile .dot {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1.5px solid rgba(35, 32, 28, 0.12);
        flex: 0 0 auto;
      }
      .tile .dots-more {
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }
      .tile .price {
        margin-top: 10px;
        font-weight: 700;
        color: var(--ink);
        font-size: 15.5px;
      }
      .tile .price s {
        color: var(--muted);
        font-weight: 600;
        margin-inline-end: 4px;
      }
      /* deep-link CTA (the only navigating control in the card besides the name) */
      .tile .tile-cta {
        margin-top: 14px;
        align-self: stretch;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: var(--display);
        font-weight: 800;
        font-size: 16px;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, var(--sage), var(--sage-deep));
        color: #fff;
        padding: 12px 22px;
        border-radius: 999px;
        text-decoration: none;
        box-shadow: 0 8px 18px rgba(229, 25, 125, 0.26);
        transition: filter 0.2s ease;
      }
      .tile .tile-cta:hover {
        filter: brightness(1.05);
      }
      .tile .tile-cta:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 3px;
      }

      /* graceful fallback if the catalog module can't load */
      .tile-fallback {
        text-align: center;
        padding: 30px 0;
      }
      .tile-fallback .btn {
        margin-top: 14px;
      }

      /* ===== FULLSCREEN ZOOM OVERLAY =====
         Self-contained (does NOT reuse options.html). Opening from a tile shows
         that design's CURRENT product LARGE by fetching the full SVG on demand and
         applying the design's ORIGINAL colours (no colour picker on this page).
         IG-webview-safe: +/- buttons and double-tap drive zoom; scroll/drag pans;
         pinch is a progressive enhancement; ×/ESC/Android-back all close. ‹ ›
         (and the segmented control) switch front/back/board. */
      .zoom {
        position: fixed;
        inset: 0;
        z-index: 120;
        background: rgba(28, 14, 25, 0.95);
      }
      .zoom[hidden] {
        display: none;
      }
      .zoom-viewport {
        position: absolute;
        inset: 0;
        overflow: auto;
        display: grid;
        place-content: safe center;
        padding: 14px;
        touch-action: pan-x pan-y;
        -webkit-overflow-scrolling: touch;
      }
      .zoom-content {
        /* zoom level 1 fits the sheet to BOTH screen dimensions; +/- multiply up to 4x. */
        width: calc(var(--zoom, 1) * min(94vw, 94dvh * 1.414));
        margin: auto;
        transition: width 0.16s ease;
      }
      .zoom-content svg,
      .zoom-content img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 6px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .zoom-loading {
        color: #fff;
        font-family: var(--display);
        font-weight: 700;
        font-size: 16px;
        text-align: center;
        padding: 40px;
      }
      .zoom-toolbar {
        position: absolute;
        z-index: 2;
        inset-block-start: calc(env(safe-area-inset-top, 0px) + 12px);
        inset-inline-end: 12px;
        display: flex;
        gap: 8px;
      }
      .zoom-btn {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        font-size: 24px;
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
        transition: background 0.16s ease;
      }
      .zoom-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      .zoom-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .zoom-btn:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 2px;
      }
      .zoom-close {
        background: rgba(255, 255, 255, 0.26);
      }
      /* product-switch arrows in fullscreen (mid-height, RTL aware) */
      .zoom-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 2;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.16);
        color: #fff;
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(6px);
        transition: background 0.16s ease;
      }
      .zoom-nav:hover {
        background: rgba(255, 255, 255, 0.32);
      }
      .zoom-nav:focus-visible {
        outline: 3px solid var(--sage);
        outline-offset: 2px;
      }
      .zoom-nav.prev {
        inset-inline-end: 12px;
      }
      .zoom-nav.next {
        inset-inline-start: 12px;
      }
      /* segmented control: front / back / board */
      .zoom-seg {
        position: absolute;
        z-index: 2;
        inset-block-start: calc(env(safe-area-inset-top, 0px) + 12px);
        inset-inline: 0;
        margin: 0 auto;
        width: max-content;
        max-width: 90vw;
        display: flex;
        gap: 4px;
        background: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 4px;
        backdrop-filter: blur(6px);
      }
      .zoom-seg[hidden] {
        display: none;
      }
      .zoom-seg button {
        border: none;
        background: transparent;
        color: #fff;
        font-family: var(--display);
        font-weight: 800;
        font-size: 14.5px;
        padding: 7px 15px;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.16s ease;
      }
      .zoom-seg button[aria-pressed='true'] {
        background: linear-gradient(135deg, var(--sage), var(--sage-deep));
      }
      .zoom-seg button:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 1px;
      }
      .zoom-hint {
        position: absolute;
        z-index: 2;
        inset-block-end: calc(env(safe-area-inset-bottom, 0px) + 18px);
        inset-inline: 0;
        margin: 0 auto;
        width: max-content;
        max-width: 90vw;
        background: rgba(0, 0, 0, 0.58);
        color: #fff;
        font-family: var(--display);
        font-weight: 700;
        font-size: 14px;
        padding: 9px 16px;
        border-radius: 999px;
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .zoom-hint.is-shown {
        opacity: 1;
      }
      .zoom-hint[hidden] {
        display: none;
      }

      /* ---- footer (copied from index.html) ---- */
      footer {
        padding: 30px 0;
        text-align: center;
        font-size: 14px;
        background: var(--ink);
        color: #e8d7de;
      }
      footer a {
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
      footer .tag {
        margin-top: 8px;
        font-size: 13px;
        color: #c7a9b5;
      }
      .foot-icons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        margin-top: 18px;
      }
      .foot-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        color: #fff;
        text-decoration: none;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
        transition:
          transform 0.16s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }
      .foot-icon:hover {
        transform: translateY(-2px);
        filter: brightness(1.06);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.34);
      }
      .foot-icon:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }
      .foot-icon svg {
        width: 24px;
        height: 24px;
        display: block;
      }
      .foot-icon.fi-wa {
        background: #25d366;
      }
      .foot-icon.fi-call {
        background: linear-gradient(140deg, var(--sage), var(--sage-deep));
      }
      .foot-icon.fi-ig {
        background: radial-gradient(
          circle at 30% 107%,
          #fdf497 0%,
          #fdf497 5%,
          #fd5949 45%,
          #d6249f 60%,
          #285aeb 90%
        );
      }
      .foot-contact {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 22px;
        justify-content: center;
        margin-top: 14px;
        font-size: 14.5px;
      }
      .foot-contact a {
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      .foot-contact a:hover {
        text-decoration: underline;
      }
      .foot-contact .fc-label {
        color: #c7a9b5;
        font-weight: 600;
      }

      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
        * {
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <nav class="nav" aria-label="ניווט ראשי">
      <div class="nav-inner">
        <a class="nav-logo" href="index.html#top" aria-label="דוגרי - לדף הבית"
          ><img src="assets/logo.png" alt="דוגרי"
        /></a>
        <button
          class="nav-toggle"
          type="button"
          data-testid="nav-toggle"
          aria-expanded="false"
          aria-controls="navLinks"
          aria-label="תפריט"
        >
          <span></span>
        </button>
        <div class="nav-links" id="navLinks" data-testid="nav-links">
          <a href="products.html" aria-current="page">העיצובים שלנו</a>
          <a href="how.html">איך זה עובד?</a>
          <a href="index.html#gallery">הצצה</a>
          <a href="index.html#proof">המלצות</a>
          <a href="timer.html">טיימר</a>
          <a class="nav-cta" href="products.html" data-ga="order_started" data-ga-cta="nav"
            >הזמנה</a
          >
        </div>
      </div>
    </nav>

    <main class="products">
      <div class="wrap">
        <div class="sec-title">
          <h2>בחרו את העיצוב</h2>
          <p>כל תבנית זמינה במגוון צבעים · אתם בוחרים</p>
        </div>
        <div class="tile-grid" id="tileGrid" data-testid="tile-grid">
          <!-- tiles rendered from js/designs.js -->
        </div>
      </div>
    </main>

    <!-- FULLSCREEN ZOOM OVERLAY — opened by a tile's ⤢ button or by tapping the
         image; loads the current product's full SVG on demand at its original
         colours. ‹ › and the segmented control switch front/back/board. -->
    <div class="zoom" id="zoomOverlay" data-testid="zoom-overlay" hidden>
      <div class="zoom-viewport" id="zoomViewport" data-testid="zoom-viewport">
        <div class="zoom-content" id="zoomContent" data-testid="zoom-content"></div>
      </div>

    <!-- Templates gallery: one tile per design, single source of truth = js/designs.js.
         Each tile: a front→back→board carousel (lightweight raster thumbs), an
         enlarge button that opens a fullscreen zoom of the full SVG, and a deep-link
         CTA into the wizard (options.html?design=<id>&step=<2 slider|3 fixed>). -->
    <script type="module">
      // PUBLIC_DESIGNS excludes private designs (hidden until unlocked with an
      // access code in the order flow); the public gallery only shows those.
      import { PUBLIC_DESIGNS as DESIGNS, MAIN_COLORS } from './js/designs.js';

      const PRICE = 79;
      const grid = document.getElementById('tileGrid');

      // Hebrew label per product kind (used by the fullscreen segmented control).
      const KIND_LABEL = { front: 'קלף', back: 'גב', board: 'לוח' };

      // Which products a design ships (board is optional — kids has none).
      function productKinds(d) {
        const t = d.thumbs || {};
        return ['front', 'back', 'board'].filter((k) => t[k]);
      }

      // ---- one tile -----------------------------------------------------------
      function tile(d) {
        const thumbs = d.thumbs || {};
        let kinds = productKinds(d);
        // Never throw on a design missing its thumbs map (e.g. added before
        // product-thumbs ran): fall back to the front thumb so the tile still shows
        // an image (single state, no flip arrows).
        if (!kinds.length) kinds = ['front'];
        const srcFor = (kind) => thumbs[kind] || d.thumb || '';
        // Fixed-colour designs (neon) have nothing to pick on the colour step, so
        // skip it and deep-link to the add-ons step instead. Sliders start on colour.
        const step = d.recolor === 'fixed' ? 3 : 2;
        const href = `options.html?design=${encodeURIComponent(d.id)}&step=${step}`;

        const card = document.createElement('article');
        card.className = 'tile';
        card.setAttribute('data-testid', 'tile');
        card.setAttribute('data-design-id', d.id);

        // ---- carousel (image + arrows + enlarge + dots) ----
        const carousel = document.createElement('div');
        carousel.className = 'carousel';

        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.setAttribute('data-testid', 'tile-image');
        thumb.setAttribute('role', 'button');
        thumb.setAttribute('tabindex', '0');
        thumb.setAttribute('aria-label', `הגדלת ${d.name}`);
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.decoding = 'async';
        img.src = srcFor(kinds[0]);
        img.alt = d.name;
        img.setAttribute('data-testid', 'tile-thumb');
        thumb.appendChild(img);
        carousel.appendChild(thumb);

        // carousel state lives on the card
        let idx = 0;
        function show(i) {
          idx = (i + kinds.length) % kinds.length;
          const kind = kinds[idx];
          img.src = srcFor(kind);
          img.alt = `${d.name} · ${KIND_LABEL[kind] || kind}`;
          carousel.querySelectorAll('.car-dot').forEach((dot, di) => {
            dot.classList.toggle('is-active', di === idx);
            dot.setAttribute('aria-pressed', di === idx ? 'true' : 'false');
          });
        }

        // arrows only when there's more than one product to flip through
        if (kinds.length > 1) {
          const prev = document.createElement('button');
          prev.type = 'button';
          prev.className = 'car-arrow prev';
          prev.setAttribute('data-testid', 'tile-prev');
          prev.setAttribute('aria-label', 'הקודם');
          prev.textContent = '›';
          prev.addEventListener('click', (e) => {
            e.stopPropagation();
            show(idx - 1);
          });

          const next = document.createElement('button');
          next.type = 'button';
          next.className = 'car-arrow next';
          next.setAttribute('data-testid', 'tile-next');
          next.setAttribute('aria-label', 'הבא');
          next.textContent = '‹';
          next.addEventListener('click', (e) => {
            e.stopPropagation();
            show(idx + 1);
          });

          carousel.appendChild(prev);
          carousel.appendChild(next);

          const dots = document.createElement('div');
          dots.className = 'car-dots';
          kinds.forEach((kind, di) => {
            const dot = document.createElement('button');
            dot.type = 'button';
            dot.className = 'car-dot' + (di === 0 ? ' is-active' : '');
            dot.setAttribute('data-testid', 'car-dot');
            dot.setAttribute('aria-label', KIND_LABEL[kind] || kind);
            dot.setAttribute('aria-pressed', di === 0 ? 'true' : 'false');
            dot.addEventListener('click', (e) => {
              e.stopPropagation();
              show(di);
            });
            dots.appendChild(dot);
          });
          carousel.appendChild(dots);
        }

        // enlarge affordance (⤢) — opens fullscreen on the CURRENT product
        const enlarge = document.createElement('button');
        enlarge.type = 'button';
        enlarge.className = 'enlarge';
        enlarge.setAttribute('data-testid', 'enlarge');
        enlarge.setAttribute('aria-label', `הגדלת ${d.name}`);
        enlarge.textContent = '⤢';
        enlarge.addEventListener('click', (e) => {
          e.stopPropagation();
          openZoom(d, kinds[idx]);
        });
        carousel.appendChild(enlarge);

        // tapping the image also opens fullscreen (keyboard: Enter/Space)
        thumb.addEventListener('click', () => openZoom(d, kinds[idx]));
        thumb.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openZoom(d, kinds[idx]);
          }
        });

        card.appendChild(carousel);

        // ---- name (navigates) ----
        const name = document.createElement('a');
        name.className = 'tname';
        name.href = href;
        name.textContent = d.name;
        card.appendChild(name);

        // ---- colour note ----
        const dots = document.createElement('div');
        dots.className = 'dots';
        if (d.recolor === 'fixed') {
          dots.setAttribute('aria-label', 'צבע קבוע');
          const dot = document.createElement('span');
          dot.className = 'dot';
          dot.setAttribute('aria-hidden', 'true');
          if (d.accent) dot.style.background = d.accent;
          dots.appendChild(dot);
          const more = document.createElement('span');
          more.className = 'dots-more';
          more.setAttribute('aria-hidden', 'true');
          more.textContent = 'צבע קבוע';
          dots.appendChild(more);
        } else {
          dots.setAttribute('aria-label', `זמין ב-${MAIN_COLORS.length} צבעים`);
          for (const c of MAIN_COLORS) {
            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.setAttribute('aria-hidden', 'true');
            dot.style.background = c.hex;
            dot.title = c.name;
            dots.appendChild(dot);
          }
          const more = document.createElement('span');
          more.className = 'dots-more';
          more.setAttribute('aria-hidden', 'true');
          more.textContent = 'ועוד';
          dots.appendChild(more);
        }
        card.appendChild(dots);

        // ---- price ----
        const price = document.createElement('div');
        price.className = 'price';
        price.textContent = `החל מ-${PRICE} ₪`;
        card.appendChild(price);

        // ---- deep-link CTA ----
        const cta = document.createElement('a');
        cta.className = 'tile-cta';
        cta.href = href;
        cta.setAttribute('data-testid', 'tile-cta');
        // Name the design for assistive tech (the visible text is only "בחרו עיצוב ›").
        cta.setAttribute('aria-label', `בחרו עיצוב ${d.name}`);
        cta.textContent = 'בחרו עיצוב ›';
        card.appendChild(cta);

        // Tapping anywhere on the card proceeds to the wizard — EXCEPT on the
        // interactive controls (arrows, dots, enlarge, the image=zoom) and the
        // name/CTA links, which act on their own. Restores the old whole-tile tap.
        card.style.cursor = 'pointer';
        card.addEventListener('click', (e) => {
          if (e.target.closest('a, button, .thumb, [role="button"]')) return;
          window.location.href = href;
        });

        return card;
      }

      try {
        if (!Array.isArray(DESIGNS) || !DESIGNS.length) throw new Error('empty catalog');
        const frag = document.createDocumentFragment();
        for (const d of DESIGNS) {
          // Isolate each tile so a single bad design skips only itself, never the
          // whole gallery.
          try {
            frag.appendChild(tile(d));
          } catch (tileErr) {
            console.error('skipping design tile:', d && d.id, tileErr);
          }
        }
        if (!frag.childNodes.length) throw new Error('no tiles rendered');
        grid.replaceChildren(frag);
      } catch (err) {
        // Graceful degradation: never leave a blank page — offer the wizard directly.
        grid.classList.add('tile-fallback');
        grid.innerHTML =
          '<div class="tile-fallback"><p>לא הצלחנו לטעון את גלריית העיצובים כרגע.</p>' +
          '<a class="btn" href="options.html">להזמנה ובחירת עיצוב ›</a></div>';
        console.error('products gallery failed to render:', err);
      }

      /* ===================================================================
         FULLSCREEN ZOOM OVERLAY (self-contained; NOT shared with options.html).
         Loads the current product's FULL SVG on demand and paints it in the
         design's ORIGINAL colours (no colour picker here). Cache fetched SVGs.
         =================================================================== */
      const zoomOverlay = document.getElementById('zoomOverlay');
      const zoomViewport = document.getElementById('zoomViewport');
      const zoomContent = document.getElementById('zoomContent');
      const zoomSeg = document.getElementById('zoomSeg');
      const zoomHint = document.getElementById('zoomHint');
      const zoomPrevBtn = document.getElementById('zoomPrev');
      const zoomNextBtn = document.getElementById('zoomNext');
      const zoomInBtn = document.getElementById('zoomIn');
      const zoomOutBtn = document.getElementById('zoomOut');
      const zoomCloseBtn = document.getElementById('zoomClose');

      const ZOOM_MIN = 1;
      const ZOOM_MAX = 4;
      let zoomScale = 1;
      let zoomOpen = false;
      let zoomPushed = false; // did we push a history entry to pop on close?
      let zoomOpener = null; // element focus returns to on close
      let curDesign = null;
      let curKinds = [];
      let curKind = 'front';
      let loadToken = 0; // invalidates a stale in-flight SVG fetch

      // Cache fetched SVG text by path (the full multi-MB SVGs are only ever
      // loaded here, on demand — never inlined in the grid).
      const svgCache = new Map();
      function loadSvg(path) {
        if (svgCache.has(path)) return svgCache.get(path);
        const p = fetch(path).then((r) =>
          r.ok ? r.text() : Promise.reject(new Error('svg ' + r.status))
        );
        // Cache only successful loads: on a rejection (network blip / 5xx) evict the
        // entry so a later open retries, instead of being pinned to a permanently
        // rejected promise (which would show the error forever until a reload).
        p.catch(() => svgCache.delete(path));
        svgCache.set(path, p);
        return p;
      }

      // Wrap the tokenized SVG so its var(--cN) paint resolves to the design's
      // ORIGINAL hexes (mirror of the site's paintSvg — no --cN vars are set, so
      // the fallback hex wins). Fixed designs (empty anchors) carry literal colours.
      let svgUid = 0;
      function paintOriginal(svgText, anchors) {
        if (!anchors || !anchors.length) return svgText;
        const id = 'zoom-svg-' + ++svgUid;
        const rules = anchors
          .map(
            (hex, i) =>
              `#${id} [fill="var(--c${i})"]{fill:var(--c${i},${hex})}` +
              `#${id} [stroke="var(--c${i})"]{stroke:var(--c${i},${hex})}`
          )
          .join('');
        return svgText.replace(/<svg\b([^>]*)>/i, `<svg id="${id}"$1><style>${rules}</style>`);
      }

      function setZoom(z) {
        zoomScale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Math.round(z * 100) / 100));
        zoomContent.style.setProperty('--zoom', String(zoomScale));
        zoomOutBtn.disabled = zoomScale <= ZOOM_MIN;
        zoomInBtn.disabled = zoomScale >= ZOOM_MAX;
      }

      // Build the front/back/board segmented control for the current design.
      function buildSeg() {
        zoomSeg.replaceChildren();
        for (const kind of curKinds) {
          const b = document.createElement('button');
          b.type = 'button';
          b.setAttribute('data-testid', 'zoom-seg-' + kind);
          b.setAttribute('data-kind', kind);
          b.setAttribute('aria-pressed', kind === curKind ? 'true' : 'false');
          b.textContent = KIND_LABEL[kind] || kind;
          b.addEventListener('click', () => switchProduct(kind));
          zoomSeg.appendChild(b);
        }
        const single = curKinds.length <= 1;
        zoomPrevBtn.hidden = single;
        zoomNextBtn.hidden = single;
      }

      // Load + inline the current product's SVG at its original colours, resetting
      // zoom. Guarded against a stale fetch landing after the user switched product.
      async function renderProduct() {
        const path = curDesign.products[curKind];
        const anchors = curDesign.anchors || [];
        const token = ++loadToken;
        zoomContent.removeAttribute('style');
        zoomContent.innerHTML = '<div class="zoom-loading">טוען…</div>';
        setZoom(1);
        zoomSeg.querySelectorAll('button').forEach((b) => {
          b.setAttribute(
            'aria-pressed',
            b.getAttribute('data-kind') === curKind ? 'true' : 'false'
          );
        });
        try {
          const svg = paintOriginal(await loadSvg(path), anchors);
          if (token !== loadToken || !zoomOpen) return; // stale / closed
          zoomContent.innerHTML = svg;
          setZoom(1);
        } catch (e) {
          if (token !== loadToken) return;
          zoomContent.innerHTML = '<div class="zoom-loading">לא ניתן לטעון את התצוגה</div>';
        }
      }

      function switchProduct(kind) {
        if (!zoomOpen || kind === curKind || !curKinds.includes(kind)) return;
        curKind = kind;
        renderProduct();
      }

      function stepProduct(delta) {
        if (curKinds.length <= 1) return;
        const i = curKinds.indexOf(curKind);
        switchProduct(curKinds[(i + delta + curKinds.length) % curKinds.length]);
      }

      function maybeShowHint() {
        const useful =
          typeof matchMedia === 'function' &&
          matchMedia('(pointer: coarse)').matches &&
          matchMedia('(orientation: portrait)').matches;
        if (!useful) return;
        let seen = false;
        try {
          seen = localStorage.getItem('dugri_zoom_hint') === '1';
        } catch (e) {}
        if (seen) return;
        zoomHint.hidden = false;
        requestAnimationFrame(() => zoomHint.classList.add('is-shown'));
        setTimeout(() => {
          zoomHint.classList.remove('is-shown');
          setTimeout(() => {
            zoomHint.hidden = true;
          }, 450);
        }, 3400);
        try {
          localStorage.setItem('dugri_zoom_hint', '1');
        } catch (e) {}
      }

      function openZoom(design, kind) {
        if (zoomOpen) return;
        curDesign = design;
        curKinds = productKinds(design);
        curKind = curKinds.includes(kind) ? kind : curKinds[0];
        buildSeg();
        zoomOpener = document.activeElement;
        zoomOverlay.hidden = false;
        zoomOpen = true;
        document.body.style.overflow = 'hidden';
        document.documentElement.style.overflow = 'hidden';
        document.addEventListener('keydown', onZoomKey);
        // Android hardware back / browser back closes the overlay via popstate.
        try {
          history.pushState({ zoom: true }, '');
          zoomPushed = true;
        } catch (e) {
          zoomPushed = false;
        }
        zoomCloseBtn.focus();
        maybeShowHint();
        renderProduct();
      }

      function hideZoom() {
        zoomOpen = false;
        zoomOverlay.hidden = true;
        document.body.style.overflow = '';
        document.documentElement.style.overflow = '';
        document.removeEventListener('keydown', onZoomKey);
        loadToken++; // drop any in-flight fetch result
        zoomContent.innerHTML = '';
        zoomContent.removeAttribute('style');
        if (zoomOpener && typeof zoomOpener.focus === 'function') zoomOpener.focus();
      }

      function closeZoom() {
        if (!zoomOpen) return;
        if (zoomPushed) {
          zoomPushed = false;
          history.back();
        } else {
          hideZoom();
        }
      }

      window.addEventListener('popstate', () => {
        if (zoomOpen) {
          zoomPushed = false;
          hideZoom();
        }
      });

      function onZoomKey(e) {
        if (e.key === 'Escape') {
          e.preventDefault();
          closeZoom();
        } else if (e.key === '+' || e.key === '=') {
          setZoom(zoomScale + 0.5);
        } else if (e.key === '-') {
          setZoom(zoomScale - 0.5);
        } else if (e.key === 'ArrowRight') {
          stepProduct(-1); // RTL: right = previous
        } else if (e.key === 'ArrowLeft') {
          stepProduct(1); // RTL: left = next
        }
      }

      zoomInBtn.addEventListener('click', () => setZoom(zoomScale + 0.5));
      zoomOutBtn.addEventListener('click', () => setZoom(zoomScale - 0.5));
      zoomCloseBtn.addEventListener('click', closeZoom);
      zoomPrevBtn.addEventListener('click', () => stepProduct(-1));
      zoomNextBtn.addEventListener('click', () => stepProduct(1));
      // tapping the dim backdrop (not the sheet) closes
      zoomViewport.addEventListener('click', (e) => {
        if (e.target === zoomViewport) closeZoom();
      });

      // double-tap / double-click toggles zoom (reliable in the IG in-app browser).
      // A pointerup only counts as a TAP if the pointer barely moved since its
      // pointerdown — otherwise dragging to pan a zoomed sheet is misread as a tap.
      const TAP_MOVE_MAX = 10; // px
      let lastTap = 0;
      let downX = 0;
      let downY = 0;
      let downMoved = false;
      zoomViewport.addEventListener('pointerdown', (e) => {
        downX = e.clientX;
        downY = e.clientY;
        downMoved = false;
      });
      zoomViewport.addEventListener('pointermove', (e) => {
        if (Math.hypot(e.clientX - downX, e.clientY - downY) > TAP_MOVE_MAX) downMoved = true;
      });
      zoomViewport.addEventListener('pointerup', (e) => {
        if (downMoved || Math.hypot(e.clientX - downX, e.clientY - downY) > TAP_MOVE_MAX) {
          lastTap = 0;
          return;
        }
        const now = Date.now();
        if (now - lastTap < 320) {
          setZoom(zoomScale > ZOOM_MIN ? ZOOM_MIN : 2.5);
          lastTap = 0;
        } else {
          lastTap = now;
        }
      });

      // pinch-to-zoom — progressive enhancement on top of the buttons.
      let pinchDist = 0;
      let pinchBase = 1;
      function touchDist(t) {
        return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
      }
      zoomViewport.addEventListener(
        'touchstart',
        (e) => {
          if (e.touches.length === 2) {
            pinchDist = touchDist(e.touches);
            pinchBase = zoomScale;
          }
        },
        { passive: true }
      );
      zoomViewport.addEventListener(
        'touchmove',
        (e) => {
          if (e.touches.length === 2 && pinchDist > 0) {
            e.preventDefault();
            setZoom(pinchBase * (touchDist(e.touches) / pinchDist));
          }
        },
        { passive: false }
      );
    </script>
  </body>
</html>
