<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="dugri:page" content="dashboard.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>דוגרי · לוח בקרה</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#8ca287" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="דוגרי" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link
      rel="stylesheet"
      href="/assets/fonts/fonts.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript><link rel="stylesheet" href="/assets/fonts/fonts.css" /></noscript>
    <link rel="stylesheet" href="/css/tokens.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Heebo', Arial, sans-serif;
        background: #f7f4ef;
        color: #23201c;
        padding: 22px 16px 60px;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }
      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }
      .nav a {
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        border: 1px solid #e4ddd0;
        background: #fff;
        color: #5c7357;
        border-radius: 99px;
        padding: 6px 14px;
      }
      .nav a.active {
        background: #8ca287;
        border-color: #8ca287;
        color: #fff;
      }
      h1 {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 4px;
      }
      .sub {
        color: #6b645b;
        margin-bottom: 18px;
      }
      .msg {
        background: #fff;
        border: 1px solid #e4ddd0;
        border-radius: 14px;
        padding: 20px;
        text-align: center;
      }
      /* The display:grid/flex below would otherwise beat the [hidden] UA rule,
         leaving cards/links on screen after a 403 or error. Restore hiding. */
      #cards[hidden],
      #links[hidden] {
        display: none;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #e4ddd0;
        border-radius: 14px;
        padding: 16px 18px;
      }
      .card .val {
        font-size: 30px;
        font-weight: 900;
        color: #5c7357;
        line-height: 1.1;
      }
      .card .lab {
        font-size: 13px;
        color: #6b645b;
        margin-top: 4px;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .links a {
        flex: 1 1 200px;
        text-decoration: none;
        background: #8ca287;
        color: #fff;
        border-radius: 14px;
        padding: 18px 20px;
        font-weight: 800;
        font-size: 16px;
        text-align: center;
      }
      .links a.alt {
        background: #fff;
        color: #5c7357;
        border: 1px solid #e4ddd0;
      }
    </style>
    <script src="js/editor.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <nav class="nav" id="nav">
        <a data-page="dashboard.html" class="active">לוח בקרה</a>
        <a data-page="admin.html">ניהול הזמנות</a>
        <a data-page="coupons.html">ניהול קופונים</a>
        <a data-page="design-codes.html">קודי עיצוב</a>
        <a data-page="admin-designs.html">עיצובים</a>
        <a data-page="admin-playbook.html">פלייבוק</a>
      </nav>
      <h1>לוח בקרה · דוגרי</h1>
      <div class="sub" id="sub">טוען…</div>
      <div class="cards" id="cards" hidden></div>
      <div class="links" id="links" hidden>
        <a id="editSite" href="#">ערוך את האתר ←</a>
        <a data-page="admin.html">ניהול הזמנות ←</a>
        <a data-page="coupons.html" class="alt">ניהול קופונים ←</a>
        <a data-page="design-codes.html" class="alt">קודי עיצוב ←</a>
      </div>
      <div id="content"></div>
    </div>

    <script type="module">
      // Trim once at the source so the SAME value is used everywhere — the
      // collections/coupons validation fetches, the nav links, and the editor
      // launch/persist — otherwise a whitespace-padded key could validate here yet
      // be handed to the editor differently and 403 every save.
      const key = (new URLSearchParams(location.search).get('key') || '').trim();
      // Carry the admin key across the three linked admin pages.
      const withKey = (page) => page + (key ? '?key=' + encodeURIComponent(key) : '');
      for (const a of document.querySelectorAll('[data-page]')) {
        a.href = withKey(a.dataset.page);
      }

      // Launch the live-site inline editor in one click, carrying the admin key.
      // The button lives in #links, which only appears once a valid key loads the
      // dashboard, so a keyless (or wrong-key) session never exposes it — meaning
      // the key here has ALREADY authenticated the dashboard. On click we persist
      // that VALIDATED key to the same localStorage slot the editor reads, so the
      // owner can then edit other pages with just ?edit=1. (The editor itself never
      // persists a raw ?key=, to avoid a stale bookmarked key poisoning storage.)
      const editSite = document.getElementById('editSite');
      if (editSite) {
        editSite.href = '/index.html?edit=1' + (key ? '&key=' + encodeURIComponent(key) : '');
        editSite.addEventListener('click', () => {
          if (key) {
            try {
              localStorage.setItem('dugri_admin_key', key);
            } catch {
              /* storage blocked — the ?key= in the href still launches edit mode */
            }
          }
        });
      }

      const sub = document.getElementById('sub');
      const cardsEl = document.getElementById('cards');
      const linksEl = document.getElementById('links');
      const content = document.getElementById('content');

      const hasOrder = (c) => !!c.order;
      const isPaid = (c) => !!(c.order && c.order.paid);
      // An "open" order is a real order that hasn't been paid yet (a pending sale),
      // not merely a collection whose status is 'open'.
      const isOpenOrder = (c) => !!(c.order && !c.order.paid);

      // Today in Israel-local terms as 'YYYY-MM-DD', to bucket "paid today".
      function israelToday() {
        return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' });
      }
      // Was this order paid today? `today` is passed in so the check isn't
      // recomputed for every collection on every poll.
      function isPaidToday(c, today) {
        const at = c.order && c.order.paid_at;
        if (!at) return false;
        try {
          return new Date(at).toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' }) === today;
        } catch {
          return false;
        }
      }

      function renderCards(cols, coupons) {
        const today = israelToday();
        // Count real ORDERS only (a collection with c.order) — not leads that
        // never ordered or cancelled collections. total = open (unpaid) + paid.
        const totalOrders = cols.filter(hasOrder).length;
        const open = cols.filter(isOpenOrder).length;
        const paid = cols.filter(isPaid).length;
        const paidToday = cols.filter((c) => isPaidToday(c, today)).length;
        const revenue = cols.reduce(
          (s, c) => s + (isPaid(c) ? (c.order.charged_total ?? c.order.total ?? 0) : 0),
          0
        );
        const activeCoupons = coupons.filter((x) => x.active).length;
        const items = [
          ['כל ההזמנות', totalOrders],
          ['פתוחות (טרם שולמו)', open],
          ['שולמו', paid],
          ['שולמו היום', paidToday],
          ['הכנסות ששולמו', revenue + ' ₪'],
          ['קופונים פעילים', activeCoupons + ' / ' + coupons.length],
        ];
        cardsEl.textContent = '';
        for (const [lab, val] of items) {
          const box = document.createElement('div');
          box.className = 'card';
          const v = document.createElement('div');
          v.className = 'val';
          v.textContent = val;
          const l = document.createElement('div');
          l.className = 'lab';
          l.textContent = lab;
          box.appendChild(v);
          box.appendChild(l);
          cardsEl.appendChild(box);
        }
        cardsEl.hidden = false;
        linksEl.hidden = false;
      }

      // Hide the stat cards + CTA links so a 403/error state never leaves stale
      // numbers on screen.
      function hideCards() {
        cardsEl.textContent = '';
        cardsEl.hidden = true;
        linksEl.hidden = true;
      }

      let pollTimer = null;
      let keyRejected = false;
      function stopPolling() {
        if (pollTimer !== null) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function load() {
        if (!key) {
          sub.textContent = '';
          hideCards();
          content.innerHTML =
            '<div class="msg">חסר מפתח גישה. פתחו עם <code>?key=…</code> בכתובת.</div>';
          return;
        }
        try {
          const [colRes, coupRes] = await Promise.all([
            fetch('/api/admin/collections?key=' + encodeURIComponent(key)),
            fetch('/api/admin/coupons?key=' + encodeURIComponent(key)),
          ]);
          if (colRes.status === 403 || coupRes.status === 403) {
            // Wrong key: stop hammering the API and clear any stale cards.
            keyRejected = true;
            stopPolling();
            sub.textContent = '';
            hideCards();
            content.innerHTML = '<div class="msg">מפתח גישה שגוי.</div>';
            return;
          }
          const cols = (await colRes.json()).collections || [];
          const coupons = (await coupRes.json()).coupons || [];
          content.innerHTML = '';
          sub.textContent = 'סקירה מהירה';
          renderCards(cols, coupons);
        } catch {
          // Transient error: drop stale cards, keep polling (may recover).
          sub.textContent = '';
          hideCards();
          content.innerHTML = '<div class="msg">שגיאה בטעינה.</div>';
        }
      }
      // Only start the 15s poll once a first load has run; a rejected key never
      // schedules it (and any later 403 clears it).
      load().then(() => {
        if (key && !keyRejected && pollTimer === null) pollTimer = setInterval(load, 15000);
      });
    </script>
  </body>
</html>
