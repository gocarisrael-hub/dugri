<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Analytics (GA4) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H1W3PQGNYF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-H1W3PQGNYF');
    </script>
    <title>תשלום (הדגמה) - דוגרי</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      />
    </noscript>
    <style>
      :root {
        --bg: #fff5f8;
        --surface: #fff;
        --ink: #2c1a29;
        --muted: #7c6a74;
        --hot: #e5197d;
        --wine: #9b2d54;
        --line: #f0dee4;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Heebo', Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
      }
      .wrap {
        max-width: 540px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }
      .head {
        text-align: center;
        margin-bottom: 18px;
      }
      .head h1 {
        font-size: 28px;
        font-weight: 900;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(44, 26, 41, 0.06);
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px dashed var(--line);
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .total {
        font-weight: 900;
        font-size: 20px;
        padding-top: 12px;
      }
      label {
        display: block;
        font-weight: 700;
        font-size: 14px;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        font: inherit;
        padding: 12px 14px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: #faf6f8;
        color: var(--muted);
      }
      .pay {
        width: 100%;
        font: inherit;
        font-weight: 900;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 14px;
        padding: 16px;
        color: #fff;
        background: linear-gradient(135deg, var(--hot), var(--wine));
        box-shadow: 0 12px 26px rgba(229, 25, 125, 0.3);
        margin-top: 8px;
      }
      .pay:active {
        transform: scale(0.99);
      }
      .note {
        text-align: center;
        color: var(--muted);
        font-size: 13.5px;
        margin-top: 12px;
      }
      /* Bit-branded payment section */
      .bit-pay {
        text-align: center;
        padding: 4px 0 2px;
      }
      .bit-amount {
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 14px;
      }
      .bit-amount b {
        font-size: 22px;
        font-weight: 900;
      }
      /* Bit brand: dark navy surface + bright Bit cyan */
      .bit-btn {
        --bit-cyan: #00e3d8;
        --bit-ink: #0c0e1a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        max-width: 360px;
        text-decoration: none;
        font: inherit;
        font-weight: 900;
        font-size: 19px;
        color: var(--bit-ink);
        background: linear-gradient(135deg, #4df2e9, var(--bit-cyan));
        border-radius: 16px;
        padding: 17px 22px;
        box-shadow:
          0 12px 28px rgba(0, 227, 216, 0.4),
          0 2px 0 rgba(255, 255, 255, 0.5) inset;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease,
          filter 0.12s ease;
      }
      .bit-btn:hover {
        filter: brightness(1.04);
        box-shadow:
          0 16px 34px rgba(0, 227, 216, 0.5),
          0 2px 0 rgba(255, 255, 255, 0.5) inset;
        transform: translateY(-1px);
      }
      .bit-btn:active {
        transform: scale(0.985);
      }
      .bit-btn .bit-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 26px;
        background: var(--bit-ink);
        color: var(--bit-cyan);
        border-radius: 7px;
        padding: 4px 7px;
      }
      .bit-btn .bit-mark svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .bit-confirm {
        margin-top: 12px;
        font-size: 13px;
        font-weight: 800;
        color: #119a6e;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .bit-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        margin: 20px 0 16px;
      }
      .bit-divider::before,
      .bit-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--line);
      }
      .back {
        display: inline-block;
        margin-top: 16px;
        color: var(--wine);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <script src="js/demo-banner.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>סיום הזמנה</h1>
      </div>

      <div class="card">
        <div class="summary-row"><span>חבילה</span><strong id="planName">—</strong></div>
        <div class="summary-row"><span>עיצוב</span><strong id="designName">—</strong></div>
        <div class="summary-row"><span>צבע</span><strong id="colorName">—</strong></div>
        <div class="summary-row total"><span>סה״כ</span><strong id="total">—</strong></div>
      </div>

      <div class="card">
        <div id="payNotice" class="bit-pay">
          <div class="bit-amount">לתשלום: <b id="bitAmount">79</b> ₪</div>
          <a
            id="bitPayLink"
            class="bit-btn"
            href="https://www.bitpay.co.il/app/me/4BE8AF50-DD1F-8868-1FF0-2DE96FEB9B6A4F38"
            target="_blank"
            rel="noopener"
          >
            <span class="bit-mark" aria-hidden="true">
              <svg viewBox="0 0 120 56" role="img" aria-label="bit">
                <g fill="currentColor">
                  <path
                    d="M8 4h9v15.2a13.5 13.5 0 0 1 8.4-2.9c8.7 0 15.3 6.9 15.3 16.2S34.1 49 25.4 49a13.4 13.4 0 0 1-8.9-3.2V48H8V4Zm16 36.6c4.4 0 7.6-3.4 7.6-8.1s-3.2-8.1-7.6-8.1-7.6 3.4-7.6 8.1 3.2 8.1 7.6 8.1Z"
                  />
                  <path
                    d="M52 4.2a5.4 5.4 0 1 1 0 10.8 5.4 5.4 0 0 1 0-10.8ZM47.5 17.2h9V48h-9V17.2Z"
                  />
                  <path
                    d="M66 8h9v9.2h7.7v7.7H75v11.7c0 2.8 1.3 4 3.9 4 1.4 0 2.6-.2 3.8-.6V48c-1.7.6-3.7.9-6 .9-7.2 0-10.7-3.7-10.7-11V24.9h-5.3v-7.7H66V8Z"
                  />
                </g>
              </svg>
            </span>
            <span>שלם בביט</span>
          </a>
          <div class="bit-confirm"><span aria-hidden="true">✓</span><span>אישור מיידי</span></div>
        </div>
        <div class="bit-divider">או</div>
        <button class="pay" id="payBtn" type="button">המשך לאיסוף המילים →</button>
        <div style="text-align: center">
          <a class="back" href="options.html">← חזרה לבחירת עיצוב</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { DESIGNS, MAIN_COLORS } from './js/designs.js';
      import { PLAN_LABELS, PLAN_PRICES, selectionNamesFromIds } from './js/configurator.js';

      const q = new URLSearchParams(location.search);

      let sel = null;
      try {
        sel = JSON.parse(localStorage.getItem('dugri_selection') || 'null');
      } catch (e) {
        sel = null;
      }
      if (!sel) {
        const names = selectionNamesFromIds(
          { design: q.get('design'), color: q.get('color'), plan: q.get('plan') },
          DESIGNS,
          MAIN_COLORS,
          PLAN_LABELS
        );
        sel = { plan: names.plan, designName: names.designName, colorName: names.colorName };
      }
      const plan = sel.plan || q.get('plan') || 'base';
      document.getElementById('planName').textContent = PLAN_LABELS[plan] || plan;
      document.getElementById('designName').textContent = sel.designName || '—';
      document.getElementById('colorName').textContent = sel.colorName || '—';
      const price = PLAN_PRICES[plan] || PLAN_PRICES.base;
      document.getElementById('total').textContent = price + ' ₪';
      document.getElementById('bitAmount').textContent = price;

      // Continue to the word-collection step. Payment is handled in Bit; the order
      // already appears on the admin orders page, so no WhatsApp ping is needed.
      document.getElementById('payBtn').addEventListener('click', () => {
        window.location.href = 'thankyou.html' + location.search;
      });
    </script>
  </body>
</html>
