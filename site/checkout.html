<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>תשלום (הדגמה) - דוגרי</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap"
      />
    </noscript>
    <style>
      :root {
        --bg: #fff5f8;
        --surface: #fff;
        --ink: #2c1a29;
        --muted: #7c6a74;
        --hot: #e5197d;
        --wine: #9b2d54;
        --line: #f0dee4;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Heebo', Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.55;
      }
      .wrap {
        max-width: 540px;
        margin: 0 auto;
        padding: 28px 18px 60px;
      }
      .head {
        text-align: center;
        margin-bottom: 18px;
      }
      .head h1 {
        font-size: 28px;
        font-weight: 900;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 8px 24px rgba(44, 26, 41, 0.06);
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px dashed var(--line);
      }
      .summary-row:last-child {
        border-bottom: none;
      }
      .total {
        font-weight: 900;
        font-size: 20px;
        padding-top: 12px;
      }
      label {
        display: block;
        font-weight: 700;
        font-size: 14px;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        font: inherit;
        padding: 12px 14px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        background: #faf6f8;
        color: var(--muted);
      }
      .pay {
        width: 100%;
        font: inherit;
        font-weight: 900;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 14px;
        padding: 16px;
        color: #fff;
        background: linear-gradient(135deg, var(--hot), var(--wine));
        box-shadow: 0 12px 26px rgba(229, 25, 125, 0.3);
        margin-top: 8px;
      }
      .pay:active {
        transform: scale(0.99);
      }
      .note {
        text-align: center;
        color: var(--muted);
        font-size: 13.5px;
        margin-top: 12px;
      }
      .cc-fields {
        position: relative;
      }
      .cc-cross {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 120px;
        line-height: 1;
        font-weight: 900;
        color: rgba(229, 25, 125, 0.3);
        pointer-events: none;
      }
      .pay-notice {
        text-align: center;
        color: var(--hot);
        background: #fff0f6;
        border: 1.5px dashed var(--hot);
        border-radius: 12px;
        padding: 14px 16px;
        margin: 16px 0 8px;
        font-weight: 800;
      }
      .pay-notice-title {
        font-weight: 800;
        margin-bottom: 4px;
      }
      .bit-box {
        margin-top: 12px;
        background: #fff;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: var(--ink);
        font-weight: 700;
      }
      .bit-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bit-num {
        font-size: 19px;
        font-weight: 900;
        letter-spacing: 0.5px;
        direction: ltr;
      }
      .bit-soon {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }
      .copy-btn {
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        border: 1.5px solid var(--hot);
        background: #fff;
        color: var(--hot);
        border-radius: 9px;
        padding: 6px 12px;
      }
      .copy-btn:active {
        transform: scale(0.97);
      }
      .back {
        display: inline-block;
        margin-top: 16px;
        color: var(--wine);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <script src="js/demo-banner.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>סיום הזמנה</h1>
      </div>

      <div class="card">
        <div class="summary-row"><span>חבילה</span><strong id="planName">—</strong></div>
        <div class="summary-row"><span>עיצוב</span><strong id="designName">—</strong></div>
        <div class="summary-row"><span>צבע</span><strong id="colorName">—</strong></div>
        <div class="summary-row total"><span>סה״כ</span><strong id="total">—</strong></div>
      </div>

      <div class="card">
        <div id="payNotice" class="pay-notice">
          <div class="pay-notice-title">כמעט שם! משלמים בביט 💜</div>
          <div class="bit-box">
            <div class="bit-row">סכום לתשלום: <b id="bitAmount">79</b> ₪</div>
            <div class="bit-row">
              בביט למספר: <b id="bitNumber" class="bit-num">054-657-7715</b>
            </div>
          </div>
          <div class="bit-soon">בקרוב — תשלום בביט בלחיצה אחת ✨</div>
        </div>
        <button class="pay" id="payBtn" type="button">המשך לאיסוף המילים →</button>
        <div style="text-align: center">
          <a class="back" href="options.html">← חזרה לבחירת עיצוב</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { DESIGNS, MAIN_COLORS } from './js/designs.js';
      import { PLAN_LABELS, PLAN_PRICES, selectionNamesFromIds } from './js/configurator.js';

      const q = new URLSearchParams(location.search);

      let sel = null;
      try {
        sel = JSON.parse(localStorage.getItem('dugri_selection') || 'null');
      } catch (e) {
        sel = null;
      }
      if (!sel) {
        const names = selectionNamesFromIds(
          { design: q.get('design'), color: q.get('color'), plan: q.get('plan') },
          DESIGNS,
          MAIN_COLORS,
          PLAN_LABELS
        );
        sel = { plan: names.plan, designName: names.designName, colorName: names.colorName };
      }
      const plan = sel.plan || q.get('plan') || 'base';
      document.getElementById('planName').textContent = PLAN_LABELS[plan] || plan;
      document.getElementById('designName').textContent = sel.designName || '—';
      document.getElementById('colorName').textContent = sel.colorName || '—';
      const price = PLAN_PRICES[plan] || PLAN_PRICES.base;
      document.getElementById('total').textContent = price + ' ₪';
      document.getElementById('bitAmount').textContent = price;

      // Continue to the word-collection step. Payment is handled in Bit; the order
      // already appears on the admin orders page, so no WhatsApp ping is needed.
      document.getElementById('payBtn').addEventListener('click', () => {
        window.location.href = 'thankyou.html' + location.search;
      });
    </script>
  </body>
</html>
